}

// ── EXPORT / IMPORT ──
function exportBibtex() {
  const sources = window._sources || DATA.sources || [];
  let bib = '';
  sources.forEach(s => {
    if (!s.doi) return;
    const authors = (s.authors || []);
    const authorStr = authors.map(a => { const p = a.split(' '); return p.length > 1 ? p[p.length-1] + ', ' + p.slice(0,-1).join(' ') : a; }).join(' and ');
    const key = ((authors[0] || 'unknown').split(' ').pop() || 'unknown').toLowerCase() + '_' + (s.year || '0000') + '_' + ((s.title || '').split(' ')[0] || 'x').toLowerCase().replace(/[^a-z]/g,'');
    bib += '@article{' + key + ',\n';
    if (s.title) bib += '  title     = {' + s.title + '},\n';
    if (authorStr) bib += '  author    = {' + authorStr + '},\n';
    if (s.venue) bib += '  journal   = {' + s.venue + '},\n';
    if (s.year) bib += '  year      = {' + s.year + '},\n';
    if (s.doi) bib += '  doi       = {' + s.doi + '},\n';
    bib += '}\n\n';
  });
  downloadFile('references.bib', bib, 'application/x-bibtex');
  showToast('Exported ' + sources.filter(s => s.doi).length + ' sources as BibTeX');
}

function exportRIS() {
  const sources = window._sources || DATA.sources || [];
  let ris = '';
  sources.forEach(s => {
    if (!s.doi) return;
    ris += 'TY  - JOUR\n';
    if (s.title) ris += 'TI  - ' + s.title + '\n';
    (s.authors || []).forEach(a => { const p = a.split(' '); ris += 'AU  - ' + (p.length > 1 ? p[p.length-1] + ', ' + p.slice(0,-1).join(' ') : a) + '\n'; });
    if (s.year) ris += 'PY  - ' + s.year + '\n';
    if (s.venue) ris += 'JO  - ' + s.venue + '\n';
    if (s.doi) ris += 'DO  - ' + s.doi + '\n';
    ris += 'ER  - \n\n';
  });
  downloadFile('references.ris', ris, 'application/x-research-info-systems');
  showToast('Exported ' + sources.filter(s => s.doi).length + ' sources as RIS');
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importSources(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    let imported = [];
    if (file.name.endsWith('.json')) {
      try {
        const data = JSON.parse(text);
        imported = Array.isArray(data) ? data : (data.sources || data.results || []);
      } catch(err) { showToast('Invalid JSON file'); return; }
    } else if (file.name.endsWith('.bib')) {
      const entries = text.split(/(?=@\w+\{)/);
      entries.forEach(entry => {
        const titleM = entry.match(/title\s*=\s*\{([^}]+)\}/i);
        const authorM = entry.match(/author\s*=\s*\{([^}]+)\}/i);
        const yearM = entry.match(/year\s*=\s*\{(\d{4})\}/i);
        const doiM = entry.match(/doi\s*=\s*\{([^}]+)\}/i);
        const journalM = entry.match(/(?:journal|booktitle)\s*=\s*\{([^}]+)\}/i);
        if (titleM) {
          imported.push({
            title: titleM[1], authors: authorM ? authorM[1].split(' and ').map(a => a.trim()) : [],
            year: yearM ? parseInt(yearM[1]) : null, doi: doiM ? doiM[1] : null,
            venue: journalM ? journalM[1] : '', status: 'screened', relevance_tags: [],
            citation_count: 0, is_open_access: false, abstract: '',
          });
        }
      });
    }
    if (imported.length === 0) { showToast('No sources found in file'); return; }

    let userImports = JSON.parse(localStorage.getItem('imported-sources') || '[]');
    const existingDois = new Set((DATA.sources || []).map(s => s.doi).concat(userImports.map(s => s.doi)));
    let added = 0;
    imported.forEach(s => {
      if (s.doi && !existingDois.has(s.doi)) { userImports.push(s); existingDois.add(s.doi); added++; }
      else if (!s.doi && s.title) { userImports.push(s); added++; }
    });
    localStorage.setItem('imported-sources', JSON.stringify(userImports));

    DATA.sources = (DATA.sources || []).concat(userImports);
    renderSources();
    showToast('Imported ' + added + ' new sources');
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── WRITE TAB ──
function buildWritingGuideHtml(sectionId) {
  const guide = WRITING_GUIDES[sectionId];
  if (!guide) return '';
  const text = (document.getElementById('write-textarea') || {}).value || '';
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const pct = guide.targetWords > 0 ? Math.min((words / guide.targetWords) * 100, 100) : 0;
  const progressColor = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--accent)';

  let html = '<div class="writing-guide">';
  html += '<div class="writing-guide-purpose">' + esc(guide.purpose) + '</div>';
  html += '<h4>Structure</h4><ol class="writing-guide-steps">';
  guide.structure.forEach(function(step) {
    html += '<li>' + esc(step) + '</li>';
  });
  html += '</ol>';
  html += '<h4>Target Word Count</h4>';
  html += '<div class="writing-guide-progress">' +
    '<div class="wg-progress-track"><div class="wg-progress-fill" style="width:' + pct.toFixed(0) + '%;background:' + progressColor + '"></div></div>' +
    '<span class="wg-progress-label">' + words + ' / ' + guide.targetWords + ' words</span></div>';
  html += '<h4>Starter Pattern</h4>';
  html += '<div class="writing-guide-starter">"' + esc(guide.starterPattern) + '"</div>';
  html += '<button class="use-starter-btn" onclick="useStarterPattern()">Use this starter</button>';
  html += '</div>';
  return html;
}

function useStarterPattern() {
  const sectionId = window._currentSection;
  const guide = WRITING_GUIDES[sectionId];
  if (!guide) return;
  const textarea = document.getElementById('write-textarea');
  if (textarea && !textarea.value.trim()) {
    textarea.value = guide.starterPattern;
    debouncedWriteCheck();
  }
}

function renderWrite() {
  const structure = DATA.dissertation_structure;
  if (!structure || !structure.chapters) {
    document.getElementById('tab-write').innerHTML = '<div class="empty-state">No dissertation structure available.</div>';
    return;
  }

  let sidebarHtml = '<h3>Chapters</h3>';
  let firstSectionId = null;
  let firstSectionTitle = null;

  structure.chapters.forEach(ch => {
    sidebarHtml += '<div class="chapter-group"><div class="chapter-title">' + esc(ch.id.toUpperCase().replace('CH', 'Ch ')) + ': ' + esc(ch.title) + '</div>';
    (ch.sections || []).forEach(sec => {
      if (!firstSectionId) { firstSectionId = sec.id; firstSectionTitle = sec.id + ' — ' + sec.title; }
      sidebarHtml += '<button class="section-btn" data-section="' + esc(sec.id) + '" data-title="' + esc(sec.id + ' — ' + sec.title) + '" onclick="selectSection(this)">' +
        esc(sec.id) + ' ' + esc(sec.title) + '</button>';
    });
    sidebarHtml += '</div>';
  });

  const html = '<div class="write-layout">' +
    '<div class="write-sidebar">' + sidebarHtml + '</div>' +
    '<div class="write-main">' +
    '<div class="section-header" id="write-section-header">' + esc(firstSectionTitle || 'Select a section') + '</div>' +
    '<div id="write-guide-container"></div>' +
    '<textarea class="write-textarea" id="write-textarea" placeholder="Start writing..." oninput="debouncedWriteCheck()"></textarea>' +
    '<div id="write-fix-bar" style="display:none;align-items:center;gap:12px;padding:10px 16px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;margin-top:8px;font-size:13px"></div>' +
    '<div class="write-footer">' +
    '<div class="write-stats"><span id="write-word-count">0 words</span><span id="write-citation-count">0 citations</span><span id="write-issues-badge"></span></div>' +
    '<button class="save-btn" onclick="saveDraft()">Save Draft</button>' +
    '</div></div>' +
    '<div class="write-checks-panel"><h3>Writing Checks <span id="checks-count-header"></span></h3><div id="live-checks-container"><div class="check-empty">Start typing to see real-time writing checks</div></div></div>' +
    '</div>';

  document.getElementById('tab-write').innerHTML = html;

  // Select first section
  if (firstSectionId) {
    const firstBtn = document.querySelector('.section-btn[data-section="' + firstSectionId + '"]');
    if (firstBtn) firstBtn.classList.add('active');
    window._currentSection = firstSectionId;
    loadDraft(firstSectionId);
  }
}

function selectSection(btn) {
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sectionId = btn.dataset.section;
  const title = btn.dataset.title;
  window._currentSection = sectionId;
  document.getElementById('write-section-header').textContent = title;
  loadDraft(sectionId);
}

function loadDraft(sectionId) {
  const key = 'draft-' + sectionId;
  const content = localStorage.getItem(key) || '';
  document.getElementById('write-textarea').value = content;
  // Render guide for the selected section
  const guideContainer = document.getElementById('write-guide-container');
  if (guideContainer) guideContainer.innerHTML = buildWritingGuideHtml(sectionId);
  updateWriteStats();
  checkWritingRealtime();
}

function saveDraft() {
  const sectionId = window._currentSection;
  if (!sectionId) return;
  const content = document.getElementById('write-textarea').value;
  localStorage.setItem('draft-' + sectionId, content);
  showToast('Draft saved for section ' + sectionId);
}

function debouncedWriteCheck() {
  if (_writeCheckDebounceTimer) clearTimeout(_writeCheckDebounceTimer);
  _writeCheckDebounceTimer = setTimeout(function() {
    updateWriteStats();
    checkWritingRealtime();
    // Update guide word progress
    var guideContainer = document.getElementById('write-guide-container');
    if (guideContainer && window._currentSection) {
      guideContainer.innerHTML = buildWritingGuideHtml(window._currentSection);
    }
  }, 500);
}

function updateWriteStats() {
  const textarea = document.getElementById('write-textarea');
  if (!textarea) return;
  const text = textarea.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const citations = (text.match(/\([^)]*\d{4}[^)]*\)/g) || []).length;
  document.getElementById('write-word-count').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('write-citation-count').textContent = citations + ' citation' + (citations !== 1 ? 's' : '');
  // Issues badge is updated by checkWritingRealtime
}

function checkWritingRealtime() {
  const textarea = document.getElementById('write-textarea');
  if (!textarea) return;
  const text = textarea.value;
  const container = document.getElementById('live-checks-container');
  if (!container) return;

  if (!text.trim()) {
    container.innerHTML = '<div class="check-empty">Start typing to see real-time writing checks</div>';
    updateIssuesBadge(0);
    return;
  }

  const issues = [];
  const lines = text.split('\n');

  // 1. Check for Americanisms
  lines.forEach(function(line, lineIdx) {
    var wordsInLine = line.toLowerCase().split(/\b/);
    for (var w = 0; w < wordsInLine.length; w++) {
      var word = wordsInLine[w].trim();
      if (AMERICAN_TO_BRITISH[word]) {
        issues.push({
          type: 'americanism',
          text: '"' + word + '" is American English',
          suggestion: 'Use "' + AMERICAN_TO_BRITISH[word] + '" instead',
          line: lineIdx + 1
        });
      }
    }
  });

  // 2. Check for contractions
  lines.forEach(function(line, lineIdx) {
    var lower = line.toLowerCase();
    Object.keys(CONTRACTIONS).forEach(function(contraction) {
      var regex = new RegExp('\\b' + contraction.replace("'", "[\\u2019']") + '\\b', 'gi');
      if (regex.test(lower)) {
        issues.push({
          type: 'contraction',
          text: 'Contraction "' + contraction + '" found',
          suggestion: 'Use "' + CONTRACTIONS[contraction] + '" in academic writing',
          line: lineIdx + 1
        });
      }
    });
  });

  // 3. Check for informal words
  lines.forEach(function(line, lineIdx) {
    var lower = line.toLowerCase();
    Object.keys(INFORMAL_WORDS).forEach(function(informal) {
      var regex = new RegExp('\\b' + informal + '\\b', 'gi');
      if (regex.test(lower)) {
        issues.push({
          type: 'tone',
          text: '"' + informal + '" is informal',
          suggestion: 'Consider "' + INFORMAL_WORDS[informal] + '"',
          line: lineIdx + 1
        });
      }
    });
  });

  // 4. Check for first person pronouns (not inside citations)
  lines.forEach(function(line, lineIdx) {
    // Remove citation brackets before checking
    var stripped = line.replace(/\[[^\]]*\]/g, '').replace(/\([^)]*\d{4}[^)]*\)/g, '');
    var pronounRegex = /\b(I|my|me|mine)\b/g;
    var match;
    while ((match = pronounRegex.exec(stripped)) !== null) {
      // Skip "I" if it's part of abbreviations like "IK" or "IFK"
      if (match[1] === 'I' && stripped[match.index + 1] && /[A-Z]/.test(stripped[match.index + 1])) continue;
      issues.push({
        type: 'tone',
        text: 'First person pronoun "' + match[1] + '" detected',
        suggestion: 'Use third person or passive voice in academic writing',
        line: lineIdx + 1
      });
    }
  });

  // 5. Check for uncited assertions
  var assertionPatterns = /\b(has been|have been|shows that|show that|indicates|indicate|suggests|suggest|is important|is critical|is essential|are important|are critical|are essential)\b/gi;
  lines.forEach(function(line, lineIdx) {
    var match;
    var testLine = line;
    assertionPatterns.lastIndex = 0;
    while ((match = assertionPatterns.exec(testLine)) !== null) {
      // Check if there is a citation in this sentence
      var sentenceEnd = testLine.indexOf('.', match.index);
      if (sentenceEnd === -1) sentenceEnd = testLine.length;
      var sentenceChunk = testLine.substring(Math.max(0, match.index - 80), sentenceEnd);
      var hasCitation = /\[\d+\]/.test(sentenceChunk) || /\([^)]*\d{4}[^)]*\)/.test(sentenceChunk);
      if (!hasCitation) {
        issues.push({
          type: 'uncited',
          text: 'Possible uncited assertion: "...' + match[0] + '..."',
          suggestion: 'Add a citation to support this claim',
          line: lineIdx + 1
        });
      }
    }
  });

  // 6. Check for sentences starting with And/But/So
  lines.forEach(function(line, lineIdx) {
    var trimmed = line.trim();
    if (/^(And|But|So)\b/.test(trimmed)) {
      issues.push({
        type: 'tone',
        text: 'Sentence starts with "' + trimmed.split(/\s/)[0] + '"',
        suggestion: 'Avoid starting sentences with conjunctions in formal writing',
        line: lineIdx + 1
      });
    }
    // Also check after full stops
    var sentences = line.split(/\.\s+/);
    for (var s = 1; s < sentences.length; s++) {
      if (/^(And|But|So)\b/.test(sentences[s].trim())) {
        issues.push({
          type: 'tone',
          text: 'Sentence starts with "' + sentences[s].trim().split(/\s/)[0] + '"',
          suggestion: 'Avoid starting sentences with conjunctions in formal writing',
          line: lineIdx + 1
        });
      }
    }
  });

  // 7. Check for exclamation marks
  lines.forEach(function(line, lineIdx) {
    if (line.indexOf('!') !== -1) {
      issues.push({
        type: 'tone',
        text: 'Exclamation mark found',
        suggestion: 'Exclamation marks are not appropriate in academic writing',
        line: lineIdx + 1
      });
    }
  });

  // Render issues
  if (issues.length === 0) {
    container.innerHTML = '<div class="check-empty" style="color:var(--green);">No issues found. Looking good!</div>';
  } else {
    var html = '';
    var typeColors = {
      americanism: 'var(--red)',
      uncited: 'var(--amber)',
      tone: 'var(--blue)',
      contraction: 'var(--purple)'
    };
    var typeClasses = {
      americanism: 'check-americanism',
      uncited: 'check-uncited',
      tone: 'check-tone',
      contraction: 'check-contraction'
    };
    issues.forEach(function(issue) {
      var dotColor = typeColors[issue.type] || 'var(--text-muted)';
      var cardClass = typeClasses[issue.type] || 'check-tone';
      html += '<div class="check-card ' + cardClass + '">' +
        '<span class="check-line-num">Line ' + issue.line + '</span>' +
        '<span class="check-dot" style="background:' + dotColor + '"></span>' +
        '<strong>' + esc(issue.text) + '</strong>' +
        '<div class="check-suggestion">' + esc(issue.suggestion) + '</div>' +
        '</div>';
    });
    container.innerHTML = html;
  }

  updateIssuesBadge(issues.length);

  // Inline fix bar
  const fixable = issues.filter(i => i.type === 'americanism' || i.type === 'contraction');
  const fixBar = document.getElementById('write-fix-bar');
  if (fixBar) {
    if (fixable.length > 0) {
      const first = fixable[0];
      fixBar.style.display = 'flex';
      fixBar.innerHTML = '<span style="flex:1"><strong style="color:var(--red)">' + esc(first.text) + '</strong> → <strong style="color:var(--green)">' + esc(first.suggestion.replace(/^.*'([^']+)'.*$/, '$1')) + '</strong> <span style="color:var(--text-muted);font-size:12px">(line ' + first.line + ')</span></span>' +
        '<button onclick="applyFix(\'' + esc(first.text).replace(/'/g, "\\'") + '\',\'' + esc(first.suggestion.replace(/^.*'([^']+)'.*$/, '$1')).replace(/'/g, "\\'") + '\')" style="padding:6px 16px;border-radius:6px;border:none;background:var(--green);color:#fff;cursor:pointer;font-size:13px;font-weight:600">Fix</button>' +
        '<button onclick="applyAllFixes()" style="padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600;margin-left:6px">Fix All (' + fixable.length + ')</button>';
    } else {
      fixBar.style.display = 'none';
    }
  }
}

function updateIssuesBadge(count) {
  var badge = document.getElementById('write-issues-badge');
  if (!badge) return;
  if (count === 0) {
    badge.innerHTML = '<span class="issues-badge badge-green">0 issues</span>';
  } else if (count <= 5) {
    badge.innerHTML = '<span class="issues-badge badge-amber">' + count + ' issue' + (count !== 1 ? 's' : '') + '</span>';
  } else {
    badge.innerHTML = '<span class="issues-badge badge-red">' + count + ' issue' + (count !== 1 ? 's' : '') + '</span>';
  }
  // Also update the checks panel header
  var checksHeader = document.getElementById('checks-count-header');
  if (checksHeader) {
    checksHeader.textContent = '(' + count + ')';
  }
}

function applyFix(wrong, right) {
  const textarea = document.getElementById('write-textarea');
  const regex = new RegExp('\\b' + wrong.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
  textarea.value = textarea.value.replace(regex, right);
  debouncedWriteCheck();
  showToast('Fixed: ' + wrong + ' → ' + right);
}

function applyAllFixes() {
  const textarea = document.getElementById('write-textarea');
  let text = textarea.value;
  for (const [am, br] of Object.entries(AMERICAN_TO_BRITISH)) {
    const regex = new RegExp('\\b' + am.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
    text = text.replace(regex, br);
  }
  for (const [contr, expand] of Object.entries(CONTRACTIONS)) {
    const regex = new RegExp(contr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    text = text.replace(regex, expand);
  }
  textarea.value = text;
  debouncedWriteCheck();
  showToast('All fixable issues resolved');
}

// ── QUIZZES TAB ──
function renderQuizzes() {
  const quizzes = DATA.quizzes || [];
  const penalty = DATA.streak_penalty;
  let html = '';

  // Redo warning
  if (penalty && penalty.must_redo_quizzes) {
    html += '<div class="quiz-warning">&#9888; Streak broken! You must redo all quizzes.</div>';
  }

  if (quizzes.length > 0) {
    const quiz = quizzes[0];
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz' +
      (quiz.quiz_type ? ' — ' + esc(quiz.quiz_type) : '') + '</h3>';

    const questions = quiz.questions || [];
    const maxScore = questions.reduce((sum, q) => {
      const rubric = q.scoring_rubric || {};
      return sum + Math.max(...Object.keys(rubric).map(Number).filter(n => !isNaN(n)), 5);
    }, 0);

    questions.forEach((q, i) => {
      const typeClass = 'q-type-' + (q.type || 'recall').replace(/\s+/g, '_');
      html += '<div class="question-card">' +
        '<div class="question-header">' +
        '<span class="q-number">' + (i + 1) + '</span>' +
        '<span class="q-type-badge ' + typeClass + '">' + esc(q.type || 'recall') + '</span>' +
        (q.difficulty ? '<span style="color:var(--text-muted);font-size:12px;">Difficulty: ' + esc(q.difficulty) + '</span>' : '') +
        '</div>';

      if (q.source_title) {
        html += '<div class="q-source">Source: ' + esc(q.source_title) + '</div>';
      }

      html += '<div class="question-text">' + esc(q.question) + '</div>' +
        '<textarea class="q-textarea" id="q-answer-' + i + '" placeholder="Type your answer..."></textarea>';

      // Rubric
      if (q.scoring_rubric && Object.keys(q.scoring_rubric).length > 0) {
        html += '<div class="rubric-box"><div class="rubric-title">Scoring Rubric</div>';
        Object.entries(q.scoring_rubric).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([score, desc]) => {
          html += '<div class="rubric-item"><span class="score-num">' + score + '</span><span>' + esc(desc) + '</span></div>';
        });
        html += '</div>';
      }

      html += '</div>';
    });

    html += '<button class="quiz-submit-btn" onclick="submitQuiz()">Submit Quiz</button>' +
      '<div class="quiz-result" id="quiz-result"></div></div>';

    // Writing prompt
    if (quiz.writing_prompt) {
      html += '<div class="card writing-prompt-section" style="margin-bottom:24px;"><h3>Writing Assignment</h3>' +
        '<div class="prompt-text">' + esc(quiz.writing_prompt) + '</div>' +
        '<textarea class="q-textarea" id="writing-prompt-answer" style="min-height:300px;" placeholder="Write your response (500-1000 words)..." oninput="updateWritingWordCount()"></textarea>' +
        '<div class="word-count-tracker" id="writing-word-count">0 / 500-1000 words</div></div>';
    }
  } else {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz</h3>' +
      '<div class="empty-state">' +
      '<img src="https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&q=75" alt="Study desk" style="width:200px;height:130px;object-fit:cover;border-radius:12px;margin-bottom:16px;opacity:0.7">' +
      '<h3 style="margin-bottom:8px;color:var(--text)">No quizzes available yet</h3>' +
      '<p>Go to Sources, click "Read" on a paper, then click "Done Reading" to generate a quiz.</p></div></div>';
  }

  // Score History
  html += '<div class="card score-history-section"><h3>Score History</h3>';
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  if (scores.length > 0) {
    html += '<ul class="score-list">';
    scores.slice().reverse().forEach(s => {
      const pct = s.max_score > 0 ? Math.round((s.score / s.max_score) * 100) : 0;
      const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      html += '<li><span>' + esc(s.date) + '</span><span>' + esc(s.quiz_type || 'Quiz') + '</span>' +
        '<span style="font-weight:600;">' + s.score + '/' + s.max_score + ' (' + pct + '%)</span>' +
        '<div class="score-bar-mini"><div class="score-bar-mini-fill" style="width:' + pct + '%;background:' + color + '"></div></div></li>';
    });
    html += '</ul>';
  } else {
    html += '<div class="empty-state">No scores recorded yet.</div>';
  }
  html += '</div>';

  document.getElementById('tab-quizzes').innerHTML = html;
}

function submitQuiz() {
  const quiz = DATA.quizzes[0];
  if (!quiz) return;
  const questions = quiz.questions || [];
  let answered = 0;
  const total = questions.length;

  questions.forEach((q, i) => {
    const textarea = document.getElementById('q-answer-' + i);
    if (textarea && textarea.value.trim().length > 10) {
      answered++;
    }
  });

  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';

  const resultDiv = document.getElementById('quiz-result');
  resultDiv.style.display = 'block';
  resultDiv.style.background = pct >= 70
    ? 'rgba(34,197,94,0.15)' : pct >= 50 ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.15)';
  resultDiv.style.color = color;
  resultDiv.innerHTML = 'You answered ' + answered + ' of ' + total + ' questions<div class="pct">' + pct + '%</div>';

  // Save to localStorage
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  scores.push({
    date: new Date().toISOString().split('T')[0],
    quiz_type: quiz.quiz_type || 'Quiz',
    score: answered,
    max_score: total
  });
  localStorage.setItem(QUIZ_SCORES_KEY, JSON.stringify(scores));

  showToast('Quiz submitted! You answered ' + answered + ' of ' + total + ' questions');
}

function updateWritingWordCount() {
  const text = document.getElementById('writing-prompt-answer').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const el = document.getElementById('writing-word-count');
  const color = words >= 500 && words <= 1000 ? 'var(--green)' : words > 1000 ? 'var(--amber)' : 'var(--text-muted)';
  el.style.color = color;
  el.textContent = words + ' / 500-1000 words';
}

// ── TIMELINE TAB ──
function renderTimeline() {
  const milestones = (DATA.timeline && DATA.timeline.milestones) || [];
  if (milestones.length === 0) {
    document.getElementById('tab-timeline').innerHTML = '<div class="empty-state">' +
      '<img src="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?w=400&q=75" alt="Calendar" style="width:200px;height:130px;object-fit:cover;border-radius:12px;margin-bottom:16px;opacity:0.7">' +
      '<h3 style="margin-bottom:8px;color:var(--text)">No milestones defined</h3><p>Timeline data will appear when available.</p></div>';
    return;
  }

  const now = new Date();
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  const catClass = { reading: 'cat-reading', writing: 'cat-writing', development: 'cat-development', review: 'cat-review' };

  let html = '<div class="timeline-container">';
  milestones.forEach(m => {
    const mDate = new Date(m.date + 'T00:00:00');
    const diff = mDate - now;
    let dotClass = 'future';
    if (diff < 0) dotClass = 'past';
    else if (diff <= weekMs) dotClass = 'current';

    html += '<div class="milestone">' +
      '<div class="milestone-dot ' + dotClass + '"></div>' +
      '<div class="milestone-date">' + formatDate(m.date) + '</div>' +
      '<div class="milestone-label">' + esc(m.label) + '</div>' +
      '<span class="milestone-category ' + (catClass[m.category] || 'cat-review') + '">' + esc(m.category) + '</span>' +
      '</div>';
  });
  html += '</div>';

  document.getElementById('tab-timeline').innerHTML = html;
}

      html += '<strong>' + esc(note.title || key) + '</strong>';
      if (note.date_read) html += '<div style="font-size:12px;color:var(--text-muted)">Read: ' + esc(note.date_read) + '</div>';
      if (note.research_question) html += '<p style="margin-top:8px"><strong>Research question:</strong> ' + esc(note.research_question) + '</p>';
      if (note.methodology) html += '<p><strong>Methodology:</strong> ' + esc(note.methodology) + '</p>';
      if (note.key_findings && note.key_findings.length) html += '<p><strong>Key findings:</strong></p><ul>' + note.key_findings.map(f => '<li>' + esc(f) + '</li>').join('') + '</ul>';
      if (note.relevance_to_my_research) html += '<p><strong>Relevance:</strong> ' + esc(note.relevance_to_my_research) + '</p>';
      html += '</div>';
    });
  }

  // Daily focus notes
  const plan = DATA.daily_plan;
  if (plan && plan.focus_notes && plan.focus_notes.length > 0) {
    html += '<h2 style="font-size:18px;font-weight:700;margin-top:32px;margin-bottom:16px">Today\'s Focus Notes</h2>';
    html += '<div class="card"><ol style="padding-left:20px">';
    plan.focus_notes.forEach(n => { html += '<li style="margin-bottom:8px">' + esc(n) + '</li>'; });
    html += '</ol></div>';
  }

  document.getElementById('tab-notes').innerHTML = html;
}

function createNewNote() {
  const area = document.getElementById('note-editor-area');
  area.innerHTML = '<div class="card" style="margin-bottom:16px">' +
    '<input type="text" id="note-title" placeholder="Note title..." style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;margin-bottom:12px">' +
    '<textarea id="note-content" placeholder="Write your note..." style="width:100%;min-height:200px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;resize:vertical;line-height:1.6"></textarea>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
    '<button class="save-btn" onclick="saveNote(-1)">Save Note</button>' +
    '<button class="btn-close" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer" onclick="renderNotes()">Cancel</button>' +
    '</div></div>';
  document.getElementById('note-title').focus();
}

function editNote(idx) {
  const notes = JSON.parse(localStorage.getItem('user-notes') || '[]');
  const note = notes[idx];
  if (!note) return;
  const area = document.getElementById('note-editor-area');
  area.innerHTML = '<div class="card" style="margin-bottom:16px">' +
    '<input type="text" id="note-title" value="' + esc(note.title || '') + '" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;margin-bottom:12px">' +
    '<textarea id="note-content" style="width:100%;min-height:200px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;resize:vertical;line-height:1.6">' + esc(note.content || '') + '</textarea>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
    '<button class="save-btn" onclick="saveNote(' + idx + ')">Save</button>' +
    '<button style="padding:10px 20px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer" onclick="deleteNote(' + idx + ')">Delete</button>' +
    '<button class="btn-close" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer" onclick="renderNotes()">Cancel</button>' +
    '</div></div>';
}

function saveNote(idx) {
  const title = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  if (!title && !content) { showToast('Note is empty'); return; }

  const notes = JSON.parse(localStorage.getItem('user-notes') || '[]');
  const now = new Date().toISOString();

  if (idx === -1) {
    notes.push({ title: title || 'Untitled', content, created_at: now, modified_at: now });
  } else {
    notes[idx].title = title || 'Untitled';
    notes[idx].content = content;
    notes[idx].modified_at = now;
  }

  localStorage.setItem('user-notes', JSON.stringify(notes));
  showToast('Note saved');
  renderNotes();
}

function deleteNote(idx) {
  const notes = JSON.parse(localStorage.getItem('user-notes') || '[]');
  notes.splice(idx, 1);
  localStorage.setItem('user-notes', JSON.stringify(notes));
  showToast('Note deleted');
  renderNotes();
}

// ── REPORTS TAB ──
function renderReports() {
  const report = DATA.feedback_report;
  const history = DATA.feedback_reports_history || [];
  let html = '';

  if (!report) {
    document.getElementById('tab-reports').innerHTML = '<div class="empty-state">' +
      '<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&q=75" alt="Analytics" style="width:200px;height:130px;object-fit:cover;border-radius:12px;margin-bottom:16px;opacity:0.7">' +
      '<h3 style="margin-bottom:8px;color:var(--text)">No feedback reports yet</h3>' +
      '<p>Reports are generated weekly by the automation. Check back after your first week of research.</p></div>';
    return;
  }

  html += '<div class="report-grid">';

  // Reading Pace
  const rp = report.reading_pace || {};
  html += '<div class="card"><h3>Reading Pace</h3>';
  html += progressBar('Papers read', rp.papers_read || 0, rp.target_papers || 5, rp.on_track ? 'var(--green)' : 'var(--red)');
  html += progressBar('Minutes', rp.total_minutes || 0, rp.target_minutes || 420, (rp.total_minutes || 0) >= (rp.target_minutes || 420) ? 'var(--green)' : 'var(--amber)');
  html += '<div style="margin-top:12px;font-size:13px;color:var(--text-muted);">Active days: ' + (rp.active_days || 0) + ' | Pomodoros: ' + (rp.pomodoros || 0) + '</div>';
  html += '</div>';

  // Quiz Performance
  const qt = report.quiz_trends || {};
  const quizColor = qt.above_target ? 'var(--green)' : 'var(--red)';
  html += '<div class="card"><h3>Quiz Performance</h3>';
  html += progressBar('Average score', qt.average_score_pct || 0, 100, quizColor);
  html += '<div style="margin-top:12px;font-size:13px;color:var(--text-muted);">Quizzes completed: ' + (qt.quizzes_completed || 0) +
    ' | Target: ' + (qt.target_score_pct || 70) + '%</div>' +
    '<div style="margin-top:4px;font-size:13px;font-weight:600;color:' + quizColor + ';">' +
    (qt.above_target ? 'Above target' : 'Below target') + '</div>';
  html += '</div>';

  html += '</div>'; // close report-grid

  // Coverage Analysis
  const ca = report.coverage_analysis || {};
  if (ca.chapters && ca.chapters.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Coverage Analysis</h3>' +
      '<div class="table-wrapper"><table class="coverage-table"><thead><tr>' +
      '<th>Chapter</th><th>Total</th><th>Read</th><th>% Read</th>' +
      '</tr></thead><tbody>';
    ca.chapters.forEach(ch => {
      const rowClass = ch.needs_attention ? 'needs-attention-row' : '';
      html += '<tr class="' + rowClass + '">' +
        '<td>' + esc(formatChapterName(ch.chapter)) + '</td>' +
        '<td>' + ch.total_sources + '</td>' +
        '<td>' + ch.read_sources + '</td>' +
        '<td>' + (ch.pct_read || 0).toFixed(0) + '%</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // Streak History
  const sh = report.streak_history || {};
  html += '<div class="card" style="margin-bottom:24px;"><h3>Streak History</h3>' +
    '<div style="display:flex;gap:40px;margin-bottom:12px;">' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.current_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Current</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.longest_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Longest</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:' + ((sh.missed_days_this_week || 0) > 0 ? 'var(--red)' : 'var(--green)') + ';">' + (sh.missed_days_this_week || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Missed This Week</div></div>' +
    '</div>';
  if (sh.missed_dates && sh.missed_dates.length > 0) {
    html += '<div style="font-size:13px;color:var(--text-muted);">Missed: ' + sh.missed_dates.map(d => formatFullDate(d)).join(', ') + '</div>';
  }
  html += '</div>';

  // Recommendations
  if (report.recommendations && report.recommendations.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Recommendations</h3><ol class="recommendations-list">';
    report.recommendations.forEach(r => { html += '<li>' + esc(r) + '</li>'; });
    html += '</ol></div>';
  }

  // Past Reports accordion
  if (history.length > 0) {
    html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;margin-top:32px;">Past Reports</h2>';
    html += '<div class="accordion">';
    history.forEach((pr, idx) => {
      if (pr.week === report.week) return; // Skip current
      html += '<div class="accordion-header" onclick="toggleAccordion(this)">' +
        '<span>Week ' + esc(pr.week || 'Unknown') + '</span><span class="arrow">&#9660;</span></div>' +
        '<div class="accordion-body" id="past-report-' + idx + '">';

      const prp = pr.reading_pace || {};
      const pqt = pr.quiz_trends || {};
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">' +
        '<div>' + progressBar('Papers', prp.papers_read || 0, prp.target_papers || 5, prp.on_track ? 'var(--green)' : 'var(--red)') + '</div>' +
        '<div>' + progressBar('Quiz avg', pqt.average_score_pct || 0, 100, pqt.above_target ? 'var(--green)' : 'var(--red)') + '</div>' +
        '</div>';

      if (pr.recommendations && pr.recommendations.length > 0) {
        html += '<ul style="padding-left:20px;font-size:13px;color:var(--text-muted);">';
        pr.recommendations.forEach(r => { html += '<li style="margin-bottom:4px;">' + esc(r) + '</li>'; });
        html += '</ul>';
      }

      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-reports').innerHTML = html;
}

function progressBar(label, value, max, color) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  return '<div class="progress-bar-container">' +
    '<div class="progress-label"><span>' + esc(label) + '</span><span>' + value + ' / ' + max + '</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>';
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}

// ── LIVE CLOCK ──
function updateClock() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const str = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear() + ' · ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  const el = document.getElementById('live-clock');
  if (el) el.textContent = str;
}
setInterval(updateClock, 1000);
updateClock();

// ── Session Sync ──
function exportSession() {
  const sessionData = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    sessionData[key] = localStorage.getItem(key);
  }
  const blob = new Blob([JSON.stringify(sessionData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'research-session-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Session exported — import this file on your other device to sync');
}

function importSession(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      for (const [key, value] of Object.entries(data)) {
        localStorage.setItem(key, value);
      }
      showToast('Session restored — refreshing...');
      setTimeout(() => location.reload(), 1000);
    } catch(err) { showToast('Invalid session file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Individual Source Export ──
function exportSingleBibtex(doi) {
  const s = (DATA.sources || []).find(src => src.doi === doi);
  if (!s) return;
  const authors = (s.authors || []);
  const authorStr = authors.map(a => { const p = a.split(' '); return p.length > 1 ? p[p.length-1] + ', ' + p.slice(0,-1).join(' ') : a; }).join(' and ');
  const key = ((authors[0] || 'unknown').split(' ').pop() || 'unknown').toLowerCase() + '_' + (s.year || '0000');
  let bib = '@article{' + key + ',\n';
  if (s.title) bib += '  title     = {' + s.title + '},\n';
  if (authorStr) bib += '  author    = {' + authorStr + '},\n';
  if (s.venue) bib += '  journal   = {' + s.venue + '},\n';
  if (s.year) bib += '  year      = {' + s.year + '},\n';
  if (s.doi) bib += '  doi       = {' + s.doi + '},\n';
  bib += '}\n';
  downloadFile(key + '.bib', bib, 'application/x-bibtex');
  showToast('BibTeX exported for: ' + (s.title || '').substring(0, 40) + '...');
}

// ── Save for Offline ──
function saveForOffline() {
  if (!_readerSource) return;
  const source = _readerSource;
  const saved = JSON.parse(localStorage.getItem('saved-offline') || '[]');
  if (saved.find(s => s.doi === source.doi)) {
    showToast('Already saved offline');
    return;
  }
  saved.push({
    doi: source.doi,
    title: source.title,
    authors: source.authors,
    year: source.year,
    venue: source.venue,
    abstract: source.abstract,
    citation_count: source.citation_count,
    open_access_url: source.open_access_url,
    relevance_tags: source.relevance_tags,
    saved_at: new Date().toISOString(),
  });
  localStorage.setItem('saved-offline', JSON.stringify(saved));
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    const url = source.open_access_url || (source.doi ? 'https://doi.org/' + source.doi : '');
    if (url) navigator.serviceWorker.controller.postMessage({ type: 'CACHE_URL', url: url });
  }
  showToast('Saved for offline: ' + (source.title || '').substring(0, 40) + '...');
}

function removeSavedOffline(doi) {
  let saved = JSON.parse(localStorage.getItem('saved-offline') || '[]');
  saved = saved.filter(s => s.doi !== doi);
  localStorage.setItem('saved-offline', JSON.stringify(saved));
  renderSaved();
  showToast('Removed from saved');
}

// ── SAVED TAB ──
function renderSaved() {
  const saved = JSON.parse(localStorage.getItem('saved-offline') || '[]');
  const readSources = JSON.parse(localStorage.getItem('read-sources') || '{}');
  let html = '';

  html += '<div style="position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:24px;height:100px;display:flex;align-items:center">' +
    '<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1200&q=75" alt="Saved books" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">' +
    '<div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(15,17,23,0.9) 50%,rgba(15,17,23,0.4))"></div>' +
    '<div style="position:relative;padding:20px 24px">' +
    '<h2 style="font-size:20px;font-weight:700">Saved &amp; Offline Resources</h2>' +
    '<p style="color:var(--text-muted);font-size:13px">Papers saved for offline reading, cached for access without internet.</p></div></div>';

  if (saved.length === 0) {
    html += '<div class="card" style="text-align:center;padding:48px">' +
      '<img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400&q=75" alt="Empty bookshelf" style="width:220px;height:140px;object-fit:cover;border-radius:12px;margin-bottom:16px;opacity:0.7">' +
      '<h3 style="color:var(--text);margin-bottom:8px">No saved resources yet</h3>' +
      '<p style="color:var(--text-muted);max-width:400px;margin:0 auto">Click "Read" on any source, then use the "Save Offline" button in the reader to save papers for offline access.</p></div>';
  } else {
    html += '<div style="display:grid;gap:12px">';
    saved.forEach(s => {
      const isRead = readSources[s.doi];
      const url = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '');
      const savedDate = new Date(s.saved_at).toLocaleDateString();
      html += '<div class="card" style="display:flex;gap:16px;align-items:start">' +
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="' + (isRead ? 'var(--green)' : 'var(--accent)') + '" stroke-width="1.5" style="flex-shrink:0;margin-top:4px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="font-weight:600;margin-bottom:4px">' + esc(s.title || 'Untitled') + '</div>' +
        '<div style="font-size:13px;color:var(--text-muted)">' + esc((s.authors || []).slice(0,3).join(', ')) + ' (' + (s.year || '') + ')</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">Saved: ' + savedDate + (isRead ? ' · <span style="color:var(--green)">Read ✓</span>' : '') + '</div>' +
        '<div style="display:flex;gap:8px;margin-top:8px">' +
        (url ? '<a href="' + esc(url) + '" target="_blank" style="padding:4px 12px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;text-decoration:none;font-weight:600">Open Paper</a>' : '') +
        '<button onclick="openReader(\'' + esc(s.doi).replace(/'/g, "\\'") + '\')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;cursor:pointer">Read with Notes</button>' +
        '<button onclick="exportSingleBibtex(\'' + esc(s.doi).replace(/'/g, "\\'") + '\')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--amber);background:transparent;color:var(--amber);font-size:12px;cursor:pointer">BibTeX</button>' +
        '<button onclick="removeSavedOffline(\'' + esc(s.doi).replace(/'/g, "\\'") + '\')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;cursor:pointer">Remove</button>' +
        '</div></div></div>';
    });
    html += '</div>';
  }

  // Reading history
  const readKeys = Object.keys(readSources);
  if (readKeys.length > 0) {
    html += '<h3 style="font-size:16px;font-weight:700;margin-top:32px;margin-bottom:16px;display:flex;align-items:center;gap:8px">' +
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      'Reading History (' + readKeys.length + ' papers read)</h3>';
    html += '<div style="display:grid;gap:8px">';
    readKeys.forEach(doi => {
      const r = readSources[doi];
      const date = new Date(r.read_date).toLocaleDateString();
      html += '<div class="card" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">' +
        '<div style="font-size:14px">' + esc(r.title || doi) + '</div>' +
        '<div style="font-size:12px;color:var(--text-muted);white-space:nowrap;margin-left:12px">Read: ' + date + '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-saved').innerHTML = html;
}

  navigator.serviceWorker.register('sw.js').catch(() => {});
}
