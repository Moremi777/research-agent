<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Agent Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --gold: #eab308;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-card h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: var(--accent);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: var(--accent-hover);
    }

    .login-error {
      color: var(--red);
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }

    /* ── App Shell ── */
    #app {
      display: none;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 14px;
    }

    #logout-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-nav button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-nav button:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .tab-nav button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Tab Content ── */
    .tab-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab { display: none; }
    .tab.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-card .stat-label {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Streak Penalty Banner ── */
    .penalty-banner {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--red);
      font-weight: 500;
    }

    .penalty-banner .icon { font-size: 24px; }

    /* ── Grid Layouts ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    /* ── Bar Charts ── */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      min-width: 100px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 24px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--accent);
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .bar-value {
      min-width: 36px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
    }

    /* ── Focus Notes ── */
    .focus-list {
      list-style: none;
      counter-reset: focus;
    }

    .focus-list li {
      counter-increment: focus;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .focus-list li:last-child { border-bottom: none; }

    .focus-list li::before {
      content: counter(focus);
      background: var(--accent);
      color: #fff;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Suggestion Cards ── */
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .suggestion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }

    .suggestion-card:hover {
      border-color: var(--accent);
    }

    .suggestion-card .sg-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .suggestion-card .sg-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .suggestion-card .sg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cite-badge {
      font-size: 12px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .read-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .read-link:hover { color: var(--accent-hover); }

    /* ── Coverage Gaps ── */
    .gap-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .gap-item:last-child { border-bottom: none; }

    .gap-label {
      min-width: 200px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .gap-bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .gap-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .gap-priority {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      min-width: 70px;
      text-align: center;
    }

    .priority-high { background: rgba(239,68,68,0.15); color: var(--red); }
    .priority-medium { background: rgba(245,158,11,0.15); color: var(--amber); }
    .priority-low { background: rgba(34,197,94,0.15); color: var(--green); }

    /* ── Sources Tab ── */
    .sources-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }

    .sort-select {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .filter-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover, .filter-tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .sources-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sources-table th {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sources-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .sources-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .sources-table .title-cell {
      cursor: pointer;
      color: var(--accent);
      font-weight: 500;
      max-width: 350px;
    }

    .sources-table .title-cell:hover {
      text-decoration: underline;
    }

    .sources-table .authors-cell {
      color: var(--text-muted);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .abstract-row {
      display: none;
    }

    .abstract-row.visible {
      display: table-row;
    }

    .abstract-row td {
      padding: 16px 24px;
      background: rgba(99, 102, 241, 0.03);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-screened { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-reading { background: rgba(245,158,11,0.15); color: var(--amber); }
    .status-read { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-cited { background: rgba(168,85,247,0.15); color: var(--purple); }
    .status-excluded { background: rgba(113,113,122,0.15); color: #71717a; }

    .tag-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin: 2px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      white-space: nowrap;
    }

    .suggested-row {
      border-left: 3px solid var(--gold) !important;
    }

    .suggested-row td:first-child::before {
      content: "\2605 ";
      color: var(--gold);
    }

    .access-link {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .access-link:hover { text-decoration: underline; }

    /* ── Write Tab ── */
    .write-layout {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      gap: 20px;
      min-height: calc(100vh - 160px);
    }

    .write-sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-sidebar h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .chapter-group {
      margin-bottom: 16px;
    }

    .chapter-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      padding: 6px 0;
      cursor: default;
    }

    .section-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .section-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .section-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .write-main {
      display: flex;
      flex-direction: column;
    }

    .write-main .section-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .write-textarea {
      flex: 1;
      min-height: 400px;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
      font-family: 'Georgia', 'Times New Roman', serif;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .write-textarea:focus { border-color: var(--accent); }

    .write-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 12px;
    }

    .write-stats {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 20px;
    }

    .save-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover { background: var(--accent-hover); }

    .write-checks-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-checks-panel h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .check-card {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .check-americanism {
      background: rgba(239,68,68,0.1);
      border-left: 3px solid var(--red);
    }

    .check-uncited {
      background: rgba(245,158,11,0.1);
      border-left: 3px solid var(--amber);
    }

    .check-tone {
      background: rgba(59,130,246,0.1);
      border-left: 3px solid var(--blue);
    }

    .check-empty {
      color: var(--text-muted);
      font-style: italic;
      padding: 24px 0;
      text-align: center;
    }

    /* ── Quizzes Tab ── */
    .quiz-warning {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      color: var(--red);
      font-weight: 600;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .question-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .q-number {
      background: var(--accent);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .q-type-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .q-type-recall { background: rgba(59,130,246,0.15); color: var(--blue); }
    .q-type-comprehension { background: rgba(34,197,94,0.15); color: var(--green); }
    .q-type-application { background: rgba(245,158,11,0.15); color: var(--amber); }
    .q-type-comparison { background: rgba(168,85,247,0.15); color: var(--purple); }
    .q-type-critical_analysis { background: rgba(239,68,68,0.15); color: var(--red); }

    .q-source {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .question-text {
      font-size: 15px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .q-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
    }

    .q-textarea:focus { border-color: var(--accent); }

    .rubric-box {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .rubric-box .rubric-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .rubric-item {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      color: var(--text-muted);
    }

    .rubric-item .score-num {
      font-weight: 700;
      color: var(--accent);
      min-width: 16px;
    }

    .self-score-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .self-score-row label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .score-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .quiz-submit-btn {
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .quiz-submit-btn:hover { background: var(--accent-hover); }

    .quiz-result {
      text-align: center;
      padding: 24px;
      border-radius: var(--radius);
      margin-top: 16px;
      font-size: 24px;
      font-weight: 700;
      display: none;
    }

    .quiz-result .pct { font-size: 18px; font-weight: 400; margin-top: 4px; }

    .writing-prompt-section {
      margin-top: 32px;
    }

    .writing-prompt-section .prompt-text {
      background: rgba(99,102,241,0.08);
      border-left: 4px solid var(--accent);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
      font-size: 15px;
      line-height: 1.6;
    }

    .word-count-tracker {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .score-history-section {
      margin-top: 32px;
    }

    .score-list {
      list-style: none;
    }

    .score-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .score-list li:last-child { border-bottom: none; }

    .score-bar-mini {
      width: 120px;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .score-bar-mini-fill {
      height: 100%;
      border-radius: 4px;
    }

    /* ── Timeline Tab ── */
    .timeline-container {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      padding-left: 40px;
    }

    .timeline-container::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .milestone {
      position: relative;
      margin-bottom: 32px;
      padding-left: 24px;
    }

    .milestone-dot {
      position: absolute;
      left: -32px;
      top: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--bg);
    }

    .milestone-dot.past {
      background: var(--green);
      border-color: var(--green);
    }

    .milestone-dot.current {
      background: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }

    .milestone-dot.future {
      background: var(--border);
      border-color: var(--border);
    }

    .milestone-date {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .milestone-label {
      font-size: 16px;
      font-weight: 600;
    }

    .milestone-category {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .cat-reading { background: rgba(59,130,246,0.15); color: var(--blue); }
    .cat-writing { background: rgba(168,85,247,0.15); color: var(--purple); }
    .cat-development { background: rgba(34,197,94,0.15); color: var(--green); }
    .cat-review { background: rgba(245,158,11,0.15); color: var(--amber); }

    /* ── Notes Tab ── */
    .notes-section { margin-bottom: 32px; }

    .notes-section h2 {
      font-size: 20px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .focus-notes-day {
      margin-bottom: 24px;
    }

    .focus-notes-day h4 {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .reading-note-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .reading-note-card h4 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .reading-note-card .note-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .reading-note-card .note-field {
      margin-bottom: 12px;
    }

    .reading-note-card .note-field-label {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .reading-note-card ul {
      padding-left: 20px;
    }

    .reading-note-card li {
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Reports Tab ── */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .progress-bar-container {
      margin-bottom: 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress-label span:first-child { color: var(--text-muted); }
    .progress-label span:last-child { font-weight: 600; }

    .progress-track {
      height: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }

    .coverage-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .coverage-table th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .coverage-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .needs-attention-row {
      color: var(--red);
    }

    .recommendations-list {
      list-style: none;
      counter-reset: recs;
    }

    .recommendations-list li {
      counter-increment: recs;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      gap: 12px;
    }

    .recommendations-list li:last-child { border-bottom: none; }

    .recommendations-list li::before {
      content: counter(recs);
      background: var(--accent);
      color: #fff;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .accordion {
      margin-top: 24px;
    }

    .accordion-header {
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .accordion-header .arrow {
      transition: transform 0.2s;
    }

    .accordion-header.open .arrow {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      margin-bottom: 8px;
      margin-top: -8px;
    }

    .accordion-body.open {
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .write-layout {
        grid-template-columns: 1fr;
      }
      .write-sidebar, .write-checks-panel {
        max-height: none;
      }
      .two-col, .report-grid {
        grid-template-columns: 1fr;
      }
      .three-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .tab-content { padding: 16px; }
      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }
      .suggestions-grid {
        grid-template-columns: 1fr;
      }
      .sources-table {
        font-size: 12px;
      }
      .sources-table th, .sources-table td {
        padding: 8px;
      }
      .gap-label {
        min-width: 120px;
        font-size: 12px;
      }
      .bar-label {
        min-width: 60px;
        font-size: 12px;
      }
      header {
        padding: 0 12px;
      }
      .tab-nav {
        padding: 8px 12px;
      }
    }

    @media (max-width: 480px) {
      .stat-grid {
        grid-template-columns: 1fr;
      }
      .login-card {
        padding: 32px 24px;
        margin: 16px;
      }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }

    /* ── Table responsive wrapper ── */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .saved-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <h1>Research Agent</h1>
    <p>Enter your password to access the dashboard</p>
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn" onclick="attemptLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid password. Please try again.</div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="logo">
      Research Agent <span>Dashboard</span>
    </div>
    <button id="logout-btn" onclick="logout()">Log Out</button>
  </header>

  <nav class="tab-nav" id="tab-nav">
    <button class="active" data-tab="dashboard">Dashboard</button>
    <button data-tab="sources">Sources</button>
    <button data-tab="write">Write</button>
    <button data-tab="quizzes">Quizzes</button>
    <button data-tab="timeline">Timeline</button>
    <button data-tab="notes">Notes</button>
    <button data-tab="reports">Reports</button>
  </nav>

  <div class="tab-content">
    <!-- Dashboard Tab -->
    <div class="tab active" id="tab-dashboard"></div>

    <!-- Sources Tab -->
    <div class="tab" id="tab-sources"></div>

    <!-- Write Tab -->
    <div class="tab" id="tab-write"></div>

    <!-- Quizzes Tab -->
    <div class="tab" id="tab-quizzes"></div>

    <!-- Timeline Tab -->
    <div class="tab" id="tab-timeline"></div>

    <!-- Notes Tab -->
    <div class="tab" id="tab-notes"></div>

    <!-- Reports Tab -->
    <div class="tab" id="tab-reports"></div>
  </div>
</div>

<div class="saved-toast" id="saved-toast">Saved successfully</div>

<script>
// ── Constants ──
const PASSWORD_HASH = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a764';
const AUTH_KEY = 'research-agent-auth';
const QUIZ_SCORES_KEY = 'quiz-scores';

let DATA = null;

// ── Authentication ──
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin() {
  const input = document.getElementById('login-password').value;
  const hash = await hashPassword(input);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem(AUTH_KEY, 'true');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// Enter key login
document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') attemptLogin();
});

// ── Check auth on load ──
if (localStorage.getItem(AUTH_KEY) === 'true') {
  showApp();
}

// ── Tab Navigation ──
document.getElementById('tab-nav').addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON') return;
  const tabName = e.target.dataset.tab;
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
});

// ── Data Loading ──
async function loadData() {
  try {
    const resp = await fetch('data.json');
    DATA = await resp.json();
    render();
  } catch (err) {
    console.error('Failed to load data.json:', err);
    document.querySelector('.tab-content').innerHTML =
      '<div class="empty-state" style="margin-top:80px;">Failed to load data.json. Make sure it exists in the same directory.</div>';
  }
}

// ── Render All ──
function render() {
  renderDashboard();
  renderSources();
  renderWrite();
  renderQuizzes();
  renderTimeline();
  renderNotes();
  renderReports();
}

// ── Utility ──
function esc(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function formatChapterName(ch) {
  return ch.replace(/^ch\d+_?/, '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function formatFullDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function showToast(msg) {
  const toast = document.getElementById('saved-toast');
  toast.textContent = msg || 'Saved successfully';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── DASHBOARD TAB ──
function renderDashboard() {
  const stats = DATA.stats;
  const streaks = DATA.streaks;
  const penalty = DATA.streak_penalty;
  const plan = DATA.daily_plan;
  const logs = DATA.daily_logs || {};

  // Today's minutes
  const today = new Date().toISOString().split('T')[0];
  const todayLog = logs[today];
  const todayMinutes = todayLog ? todayLog.total_minutes : 0;

  let html = '';

  // Streak penalty banner
  if (penalty && penalty.streak_broken) {
    html += '<div class="penalty-banner"><span class="icon">&#9888;</span><span>' +
      esc(penalty.message || 'Your streak has been broken! You missed ' + penalty.days_missed + ' day(s).') +
      '</span></div>';
  }

  // Stat cards
  const fireEmoji = streaks.current_streak_days > 0 ? ' &#128293;' : '';
  html += '<div class="stat-grid">' +
    '<div class="stat-card"><div class="stat-value">' + stats.total_sources + '</div><div class="stat-label">Total Sources</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + (stats.reading_progress_pct || 0).toFixed(0) + '%</div><div class="stat-label">Reading Progress</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + streaks.current_streak_days + fireEmoji + '</div><div class="stat-label">Current Streak</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + todayMinutes + '</div><div class="stat-label">Today\'s Minutes</div></div>' +
    '</div>';

  // Today's Focus
  if (plan && plan.focus_notes && plan.focus_notes.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Today\'s Focus</h3><ol class="focus-list">';
    plan.focus_notes.forEach(note => {
      html += '<li>' + esc(note) + '</li>';
    });
    html += '</ol></div>';
  }

  // Daily Suggested Readings
  if (plan && plan.daily_suggestions && plan.daily_suggestions.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Daily Suggested Readings</h3><div class="suggestions-grid">';
    plan.daily_suggestions.forEach(s => {
      const authors = Array.isArray(s.authors) ? s.authors.join(', ') : (s.authors || '');
      const link = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '#');
      html += '<div class="suggestion-card">' +
        '<div class="sg-title">' + esc(s.title) + '</div>' +
        '<div class="sg-meta">' + esc(authors) + '<br>' + esc(s.venue) + ', ' + s.year + '</div>' +
        '<div class="sg-footer">' +
        '<span class="cite-badge">' + (s.citation_count || 0) + ' citations</span>' +
        '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="read-link">Read &rarr;</a>' +
        '</div></div>';
    });
    html += '</div></div>';
  }

  // Coverage Gaps
  if (plan && plan.coverage_gaps && plan.coverage_gaps.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Coverage Gaps</h3>';
    plan.coverage_gaps.forEach(gap => {
      const pct = gap.target > 0 ? Math.min((gap.read_count / gap.target) * 100, 100) : 0;
      const prioClass = gap.priority === 'high' ? 'priority-high' : gap.priority === 'medium' ? 'priority-medium' : 'priority-low';
      const barColor = gap.priority === 'high' ? 'var(--red)' : gap.priority === 'medium' ? 'var(--amber)' : 'var(--green)';
      html += '<div class="gap-item">' +
        '<span class="gap-label">' + esc(formatChapterName(gap.chapter)) + '</span>' +
        '<div class="gap-bar-track"><div class="gap-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
        '<span>' + gap.read_count + '/' + gap.target + '</span>' +
        '<span class="gap-priority ' + prioClass + '">' + esc(gap.priority) + '</span>' +
        '</div>';
    });
    html += '</div>';
  }

  // Charts: Sources by Year and Sources by Status
  html += '<div class="two-col">';

  // Sources by Year
  html += '<div class="card"><h3>Sources by Year</h3><div class="bar-chart">';
  const byYear = stats.by_year || {};
  const maxYear = Math.max(...Object.values(byYear), 1);
  Object.entries(byYear).sort((a,b) => a[0].localeCompare(b[0])).forEach(([year, count]) => {
    const pct = (count / maxYear) * 100;
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + year + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  // Sources by Status
  html += '<div class="card"><h3>Sources by Status</h3><div class="bar-chart">';
  const byStatus = stats.by_status || {};
  const maxStatus = Math.max(...Object.values(byStatus), 1);
  const statusColors = { screened: 'var(--blue)', reading: 'var(--amber)', read: 'var(--green)', cited: 'var(--purple)', excluded: '#71717a' };
  Object.entries(byStatus).forEach(([status, count]) => {
    const pct = (count / maxStatus) * 100;
    const color = statusColors[status] || 'var(--accent)';
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  html += '</div>'; // close two-col

  document.getElementById('tab-dashboard').innerHTML = html;
}

// ── SOURCES TAB ──
function renderSources() {
  const sources = DATA.sources || [];
  const tags = DATA.stats.by_tag ? Object.keys(DATA.stats.by_tag) : [];
  const suggestedDois = new Set();
  if (DATA.daily_plan && DATA.daily_plan.daily_suggestions) {
    DATA.daily_plan.daily_suggestions.forEach(s => { if (s.doi) suggestedDois.add(s.doi); });
  }

  let html = '<div class="sources-controls">' +
    '<input type="text" class="search-box" id="source-search" placeholder="Search title, authors, venue, DOI..." oninput="filterSources()">' +
    '<select class="sort-select" id="source-sort" onchange="filterSources()">' +
    '<option value="citations">Sort by Citations</option>' +
    '<option value="year">Sort by Year</option>' +
    '<option value="title">Sort by Title</option>' +
    '</select></div>';

  html += '<div class="filter-tags" id="filter-tags">' +
    '<button class="filter-tag active" data-tag="all" onclick="setTagFilter(this)">All</button>';
  tags.forEach(tag => {
    html += '<button class="filter-tag" data-tag="' + esc(tag) + '" onclick="setTagFilter(this)">' +
      esc(tag.replace(/_/g, ' ')) + '</button>';
  });
  html += '</div>';

  html += '<div class="table-wrapper"><table class="sources-table" id="sources-table"><thead><tr>' +
    '<th>Title</th><th>Authors</th><th>Year</th><th>Cited</th><th>Status</th><th>Tags</th><th>Access</th>' +
    '</tr></thead><tbody id="sources-tbody"></tbody></table></div>';

  document.getElementById('tab-sources').innerHTML = html;

  // Store sources for filtering
  window._sources = sources;
  window._suggestedDois = suggestedDois;
  window._activeTag = 'all';
  filterSources();
}

function setTagFilter(btn) {
  document.querySelectorAll('#filter-tags .filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window._activeTag = btn.dataset.tag;
  filterSources();
}

function filterSources() {
  const search = (document.getElementById('source-search').value || '').toLowerCase();
  const sort = document.getElementById('source-sort').value;
  const tag = window._activeTag || 'all';
  const sugDois = window._suggestedDois || new Set();

  let filtered = (window._sources || []).filter(s => {
    if (s.status === 'excluded') return false;
    if (tag !== 'all' && !(s.relevance_tags || []).includes(tag)) return false;
    if (search) {
      const haystack = [s.title, (s.authors || []).join(' '), s.venue, s.doi].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  if (sort === 'citations') filtered.sort((a,b) => (b.citation_count || 0) - (a.citation_count || 0));
  else if (sort === 'year') filtered.sort((a,b) => b.year - a.year);
  else if (sort === 'title') filtered.sort((a,b) => (a.title || '').localeCompare(b.title || ''));

  let html = '';
  filtered.forEach((s, i) => {
    const isSuggested = sugDois.has(s.doi);
    const rowClass = isSuggested ? 'suggested-row' : '';
    const authors = Array.isArray(s.authors) ? s.authors.slice(0, 3).join(', ') + (s.authors.length > 3 ? ' et al.' : '') : '';
    const statusClass = 'status-' + (s.status || 'screened');
    const link = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '');
    const tagPills = (s.relevance_tags || []).map(t => '<span class="tag-pill">' + esc(t.replace(/_/g, ' ')) + '</span>').join('');

    html += '<tr class="' + rowClass + '">' +
      '<td class="title-cell" onclick="toggleAbstract(' + i + ')">' + esc(s.title) + '</td>' +
      '<td class="authors-cell" title="' + esc((s.authors || []).join(', ')) + '">' + esc(authors) + '</td>' +
      '<td>' + (s.year || '') + '</td>' +
      '<td>' + (s.citation_count || 0) + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + esc(s.status || 'screened') + '</span></td>' +
      '<td>' + tagPills + '</td>' +
      '<td>' + (link ? '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="access-link">Open</a>' : '-') + '</td>' +
      '</tr>';

    html += '<tr class="abstract-row" id="abstract-' + i + '"><td colspan="7">' +
      (s.abstract ? esc(s.abstract).substring(0, 600) + (s.abstract.length > 600 ? '...' : '') : '<em>No abstract available</em>') +
      '</td></tr>';
  });

  document.getElementById('sources-tbody').innerHTML = html;
}

function toggleAbstract(idx) {
  const row = document.getElementById('abstract-' + idx);
  if (row) row.classList.toggle('visible');
}

// ── WRITE TAB ──
function renderWrite() {
  const structure = DATA.dissertation_structure;
  if (!structure || !structure.chapters) {
    document.getElementById('tab-write').innerHTML = '<div class="empty-state">No dissertation structure available.</div>';
    return;
  }

  let sidebarHtml = '<h3>Chapters</h3>';
  let firstSectionId = null;
  let firstSectionTitle = null;

  structure.chapters.forEach(ch => {
    sidebarHtml += '<div class="chapter-group"><div class="chapter-title">' + esc(ch.id.toUpperCase().replace('CH', 'Ch ')) + ': ' + esc(ch.title) + '</div>';
    (ch.sections || []).forEach(sec => {
      if (!firstSectionId) { firstSectionId = sec.id; firstSectionTitle = sec.id + ' — ' + sec.title; }
      sidebarHtml += '<button class="section-btn" data-section="' + esc(sec.id) + '" data-title="' + esc(sec.id + ' — ' + sec.title) + '" onclick="selectSection(this)">' +
        esc(sec.id) + ' ' + esc(sec.title) + '</button>';
    });
    sidebarHtml += '</div>';
  });

  // Writing checks panel
  const checks = DATA.writing_checks || [];
  let checksHtml = '<h3>Writing Suggestions</h3>';
  if (checks.length === 0) {
    checksHtml += '<div class="check-empty">Save your draft and the agent will check it automatically</div>';
  } else {
    checks.forEach(check => {
      (check.americanisms_found || []).forEach(issue => {
        checksHtml += '<div class="check-card check-americanism"><strong>Americanism:</strong> ' + esc(typeof issue === 'string' ? issue : JSON.stringify(issue)) + '</div>';
      });
      (check.uncited_claims || []).forEach(issue => {
        checksHtml += '<div class="check-card check-uncited"><strong>Uncited claim:</strong> ' + esc(typeof issue === 'string' ? issue : JSON.stringify(issue)) + '</div>';
      });
      (check.academic_tone_issues || []).forEach(issue => {
        checksHtml += '<div class="check-card check-tone"><strong>Tone:</strong> ' + esc(typeof issue === 'string' ? issue : JSON.stringify(issue)) + '</div>';
      });
    });
  }

  const html = '<div class="write-layout">' +
    '<div class="write-sidebar">' + sidebarHtml + '</div>' +
    '<div class="write-main">' +
    '<div class="section-header" id="write-section-header">' + esc(firstSectionTitle || 'Select a section') + '</div>' +
    '<textarea class="write-textarea" id="write-textarea" placeholder="Start writing..." oninput="updateWriteStats()"></textarea>' +
    '<div class="write-footer">' +
    '<div class="write-stats"><span id="write-word-count">0 words</span><span id="write-citation-count">0 citations</span></div>' +
    '<button class="save-btn" onclick="saveDraft()">Save Draft</button>' +
    '</div></div>' +
    '<div class="write-checks-panel">' + checksHtml + '</div>' +
    '</div>';

  document.getElementById('tab-write').innerHTML = html;

  // Select first section
  if (firstSectionId) {
    const firstBtn = document.querySelector('.section-btn[data-section="' + firstSectionId + '"]');
    if (firstBtn) firstBtn.classList.add('active');
    window._currentSection = firstSectionId;
    loadDraft(firstSectionId);
  }
}

function selectSection(btn) {
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sectionId = btn.dataset.section;
  const title = btn.dataset.title;
  window._currentSection = sectionId;
  document.getElementById('write-section-header').textContent = title;
  loadDraft(sectionId);
}

function loadDraft(sectionId) {
  const key = 'draft-' + sectionId;
  const content = localStorage.getItem(key) || '';
  document.getElementById('write-textarea').value = content;
  updateWriteStats();
}

function saveDraft() {
  const sectionId = window._currentSection;
  if (!sectionId) return;
  const content = document.getElementById('write-textarea').value;
  localStorage.setItem('draft-' + sectionId, content);
  showToast('Draft saved for section ' + sectionId);
}

function updateWriteStats() {
  const text = document.getElementById('write-textarea').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const citations = (text.match(/\([^)]*\d{4}[^)]*\)/g) || []).length;
  document.getElementById('write-word-count').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('write-citation-count').textContent = citations + ' citation' + (citations !== 1 ? 's' : '');
}

// ── QUIZZES TAB ──
function renderQuizzes() {
  const quizzes = DATA.quizzes || [];
  const penalty = DATA.streak_penalty;
  let html = '';

  // Redo warning
  if (penalty && penalty.must_redo_quizzes) {
    html += '<div class="quiz-warning">&#9888; Streak broken! You must redo all quizzes.</div>';
  }

  if (quizzes.length > 0) {
    const quiz = quizzes[0];
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz' +
      (quiz.quiz_type ? ' — ' + esc(quiz.quiz_type) : '') + '</h3>';

    const questions = quiz.questions || [];
    const maxScore = questions.reduce((sum, q) => {
      const rubric = q.scoring_rubric || {};
      return sum + Math.max(...Object.keys(rubric).map(Number).filter(n => !isNaN(n)), 5);
    }, 0);

    questions.forEach((q, i) => {
      const typeClass = 'q-type-' + (q.type || 'recall').replace(/\s+/g, '_');
      html += '<div class="question-card">' +
        '<div class="question-header">' +
        '<span class="q-number">' + (i + 1) + '</span>' +
        '<span class="q-type-badge ' + typeClass + '">' + esc(q.type || 'recall') + '</span>' +
        (q.difficulty ? '<span style="color:var(--text-muted);font-size:12px;">Difficulty: ' + esc(q.difficulty) + '</span>' : '') +
        '</div>';

      if (q.source_title) {
        html += '<div class="q-source">Source: ' + esc(q.source_title) + '</div>';
      }

      html += '<div class="question-text">' + esc(q.question) + '</div>' +
        '<textarea class="q-textarea" id="q-answer-' + i + '" placeholder="Type your answer..."></textarea>';

      // Rubric
      if (q.scoring_rubric && Object.keys(q.scoring_rubric).length > 0) {
        html += '<div class="rubric-box"><div class="rubric-title">Scoring Rubric</div>';
        Object.entries(q.scoring_rubric).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([score, desc]) => {
          html += '<div class="rubric-item"><span class="score-num">' + score + '</span><span>' + esc(desc) + '</span></div>';
        });
        html += '</div>';
      }

      // Self-score dropdown
      const maxQ = q.scoring_rubric ? Math.max(...Object.keys(q.scoring_rubric).map(Number).filter(n => !isNaN(n)), 5) : 5;
      html += '<div class="self-score-row"><label>Self-score:</label><select class="score-select" id="q-score-' + i + '">' +
        '<option value="">--</option>';
      for (let s = 0; s <= maxQ; s++) {
        html += '<option value="' + s + '">' + s + '</option>';
      }
      html += '</select></div></div>';
    });

    html += '<button class="quiz-submit-btn" onclick="submitQuiz()">Submit Quiz</button>' +
      '<div class="quiz-result" id="quiz-result"></div></div>';

    // Writing prompt
    if (quiz.writing_prompt) {
      html += '<div class="card writing-prompt-section" style="margin-bottom:24px;"><h3>Writing Assignment</h3>' +
        '<div class="prompt-text">' + esc(quiz.writing_prompt) + '</div>' +
        '<textarea class="q-textarea" id="writing-prompt-answer" style="min-height:300px;" placeholder="Write your response (500-1000 words)..." oninput="updateWritingWordCount()"></textarea>' +
        '<div class="word-count-tracker" id="writing-word-count">0 / 500-1000 words</div></div>';
    }
  } else {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz</h3>' +
      '<div class="empty-state">No quizzes available yet. Complete a reading session to generate a quiz.</div></div>';
  }

  // Score History
  html += '<div class="card score-history-section"><h3>Score History</h3>';
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  if (scores.length > 0) {
    html += '<ul class="score-list">';
    scores.slice().reverse().forEach(s => {
      const pct = s.max_score > 0 ? Math.round((s.score / s.max_score) * 100) : 0;
      const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      html += '<li><span>' + esc(s.date) + '</span><span>' + esc(s.quiz_type || 'Quiz') + '</span>' +
        '<span style="font-weight:600;">' + s.score + '/' + s.max_score + ' (' + pct + '%)</span>' +
        '<div class="score-bar-mini"><div class="score-bar-mini-fill" style="width:' + pct + '%;background:' + color + '"></div></div></li>';
    });
    html += '</ul>';
  } else {
    html += '<div class="empty-state">No scores recorded yet.</div>';
  }
  html += '</div>';

  document.getElementById('tab-quizzes').innerHTML = html;
}

function submitQuiz() {
  const quiz = DATA.quizzes[0];
  if (!quiz) return;
  const questions = quiz.questions || [];
  let totalScore = 0;
  let maxScore = 0;

  questions.forEach((q, i) => {
    const sel = document.getElementById('q-score-' + i);
    const val = sel ? parseInt(sel.value) : 0;
    totalScore += isNaN(val) ? 0 : val;
    const maxQ = q.scoring_rubric ? Math.max(...Object.keys(q.scoring_rubric).map(Number).filter(n => !isNaN(n)), 5) : 5;
    maxScore += maxQ;
  });

  const pct = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';

  const resultDiv = document.getElementById('quiz-result');
  resultDiv.style.display = 'block';
  resultDiv.style.background = color.replace('var(', '').replace(')', '') === '--green'
    ? 'rgba(34,197,94,0.15)' : color === 'var(--amber)' ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.15)';
  resultDiv.style.color = color;
  resultDiv.innerHTML = totalScore + '/' + maxScore + '<div class="pct">' + pct + '%</div>';

  // Save to localStorage
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  scores.push({
    date: new Date().toISOString().split('T')[0],
    quiz_type: quiz.quiz_type || 'Quiz',
    score: totalScore,
    max_score: maxScore
  });
  localStorage.setItem(QUIZ_SCORES_KEY, JSON.stringify(scores));

  showToast('Quiz submitted! Score: ' + pct + '%');
}

function updateWritingWordCount() {
  const text = document.getElementById('writing-prompt-answer').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const el = document.getElementById('writing-word-count');
  const color = words >= 500 && words <= 1000 ? 'var(--green)' : words > 1000 ? 'var(--amber)' : 'var(--text-muted)';
  el.style.color = color;
  el.textContent = words + ' / 500-1000 words';
}

// ── TIMELINE TAB ──
function renderTimeline() {
  const milestones = (DATA.timeline && DATA.timeline.milestones) || [];
  if (milestones.length === 0) {
    document.getElementById('tab-timeline').innerHTML = '<div class="empty-state">No milestones defined.</div>';
    return;
  }

  const now = new Date();
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  const catClass = { reading: 'cat-reading', writing: 'cat-writing', development: 'cat-development', review: 'cat-review' };

  let html = '<div class="timeline-container">';
  milestones.forEach(m => {
    const mDate = new Date(m.date + 'T00:00:00');
    const diff = mDate - now;
    let dotClass = 'future';
    if (diff < 0) dotClass = 'past';
    else if (diff <= weekMs) dotClass = 'current';

    html += '<div class="milestone">' +
      '<div class="milestone-dot ' + dotClass + '"></div>' +
      '<div class="milestone-date">' + formatDate(m.date) + '</div>' +
      '<div class="milestone-label">' + esc(m.label) + '</div>' +
      '<span class="milestone-category ' + (catClass[m.category] || 'cat-review') + '">' + esc(m.category) + '</span>' +
      '</div>';
  });
  html += '</div>';

  document.getElementById('tab-timeline').innerHTML = html;
}

// ── NOTES TAB ──
function renderNotes() {
  const plan = DATA.daily_plan;
  const planHistory = DATA.daily_plans_history || [];
  const notes = DATA.notes || {};
  let html = '';

  // Daily Focus Notes
  html += '<div class="notes-section"><h2>Daily Focus Notes</h2>';

  if (plan && plan.focus_notes && plan.focus_notes.length > 0) {
    html += '<div class="focus-notes-day"><h4>' + formatFullDate(plan.date) + '</h4><ol class="focus-list">';
    plan.focus_notes.forEach(n => { html += '<li>' + esc(n) + '</li>'; });
    html += '</ol></div>';
  }

  planHistory.forEach(p => {
    if (p.date === (plan && plan.date)) return;
    if (p.focus_notes && p.focus_notes.length > 0) {
      html += '<div class="focus-notes-day"><h4>' + formatFullDate(p.date) + '</h4><ol class="focus-list">';
      p.focus_notes.forEach(n => { html += '<li>' + esc(n) + '</li>'; });
      html += '</ol></div>';
    }
  });

  if ((!plan || !plan.focus_notes || plan.focus_notes.length === 0) && planHistory.length === 0) {
    html += '<div class="empty-state">No focus notes available yet.</div>';
  }
  html += '</div>';

  // Reading Notes
  html += '<div class="notes-section"><h2>Reading Notes</h2>';
  const noteKeys = Object.keys(notes);
  if (noteKeys.length > 0) {
    noteKeys.forEach(key => {
      const n = notes[key];
      html += '<div class="reading-note-card">' +
        '<h4>' + esc(n.title) + '</h4>' +
        '<div class="note-meta">Read: ' + esc(n.date_read || 'Unknown') + '</div>';

      if (n.research_question) {
        html += '<div class="note-field"><div class="note-field-label">Research Question</div><p>' + esc(n.research_question) + '</p></div>';
      }
      if (n.methodology) {
        html += '<div class="note-field"><div class="note-field-label">Methodology</div><p>' + esc(n.methodology) + '</p></div>';
      }
      if (n.key_findings && n.key_findings.length > 0) {
        html += '<div class="note-field"><div class="note-field-label">Key Findings</div><ul>';
        n.key_findings.forEach(f => { html += '<li>' + esc(f) + '</li>'; });
        html += '</ul></div>';
      }
      if (n.relevance_to_my_research) {
        html += '<div class="note-field"><div class="note-field-label">Relevance to My Research</div><p>' + esc(n.relevance_to_my_research) + '</p></div>';
      }

      html += '</div>';
    });
  } else {
    html += '<div class="empty-state">No reading notes yet — complete a reading session to see notes here</div>';
  }
  html += '</div>';

  document.getElementById('tab-notes').innerHTML = html;
}

// ── REPORTS TAB ──
function renderReports() {
  const report = DATA.feedback_report;
  const history = DATA.feedback_reports_history || [];
  let html = '';

  if (!report) {
    document.getElementById('tab-reports').innerHTML = '<div class="empty-state">No feedback reports available yet.</div>';
    return;
  }

  html += '<div class="report-grid">';

  // Reading Pace
  const rp = report.reading_pace || {};
  html += '<div class="card"><h3>Reading Pace</h3>';
  html += progressBar('Papers read', rp.papers_read || 0, rp.target_papers || 5, rp.on_track ? 'var(--green)' : 'var(--red)');
  html += progressBar('Minutes', rp.total_minutes || 0, rp.target_minutes || 420, (rp.total_minutes || 0) >= (rp.target_minutes || 420) ? 'var(--green)' : 'var(--amber)');
  html += '<div style="margin-top:12px;font-size:13px;color:var(--text-muted);">Active days: ' + (rp.active_days || 0) + ' | Pomodoros: ' + (rp.pomodoros || 0) + '</div>';
  html += '</div>';

  // Quiz Performance
  const qt = report.quiz_trends || {};
  const quizColor = qt.above_target ? 'var(--green)' : 'var(--red)';
  html += '<div class="card"><h3>Quiz Performance</h3>';
  html += progressBar('Average score', qt.average_score_pct || 0, 100, quizColor);
  html += '<div style="margin-top:12px;font-size:13px;color:var(--text-muted);">Quizzes completed: ' + (qt.quizzes_completed || 0) +
    ' | Target: ' + (qt.target_score_pct || 70) + '%</div>' +
    '<div style="margin-top:4px;font-size:13px;font-weight:600;color:' + quizColor + ';">' +
    (qt.above_target ? 'Above target' : 'Below target') + '</div>';
  html += '</div>';

  html += '</div>'; // close report-grid

  // Coverage Analysis
  const ca = report.coverage_analysis || {};
  if (ca.chapters && ca.chapters.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Coverage Analysis</h3>' +
      '<div class="table-wrapper"><table class="coverage-table"><thead><tr>' +
      '<th>Chapter</th><th>Total</th><th>Read</th><th>% Read</th>' +
      '</tr></thead><tbody>';
    ca.chapters.forEach(ch => {
      const rowClass = ch.needs_attention ? 'needs-attention-row' : '';
      html += '<tr class="' + rowClass + '">' +
        '<td>' + esc(formatChapterName(ch.chapter)) + '</td>' +
        '<td>' + ch.total_sources + '</td>' +
        '<td>' + ch.read_sources + '</td>' +
        '<td>' + (ch.pct_read || 0).toFixed(0) + '%</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // Streak History
  const sh = report.streak_history || {};
  html += '<div class="card" style="margin-bottom:24px;"><h3>Streak History</h3>' +
    '<div style="display:flex;gap:40px;margin-bottom:12px;">' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.current_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Current</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.longest_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Longest</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:' + ((sh.missed_days_this_week || 0) > 0 ? 'var(--red)' : 'var(--green)') + ';">' + (sh.missed_days_this_week || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Missed This Week</div></div>' +
    '</div>';
  if (sh.missed_dates && sh.missed_dates.length > 0) {
    html += '<div style="font-size:13px;color:var(--text-muted);">Missed: ' + sh.missed_dates.map(d => formatFullDate(d)).join(', ') + '</div>';
  }
  html += '</div>';

  // Recommendations
  if (report.recommendations && report.recommendations.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Recommendations</h3><ol class="recommendations-list">';
    report.recommendations.forEach(r => { html += '<li>' + esc(r) + '</li>'; });
    html += '</ol></div>';
  }

  // Past Reports accordion
  if (history.length > 0) {
    html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;margin-top:32px;">Past Reports</h2>';
    html += '<div class="accordion">';
    history.forEach((pr, idx) => {
      if (pr.week === report.week) return; // Skip current
      html += '<div class="accordion-header" onclick="toggleAccordion(this)">' +
        '<span>Week ' + esc(pr.week || 'Unknown') + '</span><span class="arrow">&#9660;</span></div>' +
        '<div class="accordion-body" id="past-report-' + idx + '">';

      const prp = pr.reading_pace || {};
      const pqt = pr.quiz_trends || {};
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">' +
        '<div>' + progressBar('Papers', prp.papers_read || 0, prp.target_papers || 5, prp.on_track ? 'var(--green)' : 'var(--red)') + '</div>' +
        '<div>' + progressBar('Quiz avg', pqt.average_score_pct || 0, 100, pqt.above_target ? 'var(--green)' : 'var(--red)') + '</div>' +
        '</div>';

      if (pr.recommendations && pr.recommendations.length > 0) {
        html += '<ul style="padding-left:20px;font-size:13px;color:var(--text-muted);">';
        pr.recommendations.forEach(r => { html += '<li style="margin-bottom:4px;">' + esc(r) + '</li>'; });
        html += '</ul>';
      }

      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-reports').innerHTML = html;
}

function progressBar(label, value, max, color) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  return '<div class="progress-bar-container">' +
    '<div class="progress-label"><span>' + esc(label) + '</span><span>' + value + ' / ' + max + '</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>';
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}
