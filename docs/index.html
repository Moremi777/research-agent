<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Agent Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --gold: #eab308;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-card h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: var(--accent);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: var(--accent-hover);
    }

    .login-error {
      color: var(--red);
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }

    /* ── App Shell ── */
    #app {
      display: none;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 14px;
    }

    #logout-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-nav button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-nav button:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .tab-nav button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Tab Content ── */
    .tab-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab { display: none; }
    .tab.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-card .stat-label {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Streak Penalty Banner ── */
    .penalty-banner {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--red);
      font-weight: 500;
    }

    .penalty-banner .icon { font-size: 24px; }

    /* ── Grid Layouts ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    /* ── Bar Charts ── */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      min-width: 100px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 24px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--accent);
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .bar-value {
      min-width: 36px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
    }

    /* ── Focus Notes ── */
    .focus-list {
      list-style: none;
      counter-reset: focus;
    }

    .focus-list li {
      counter-increment: focus;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .focus-list li:last-child { border-bottom: none; }

    .focus-list li::before {
      content: counter(focus);
      background: var(--accent);
      color: #fff;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Suggestion Cards ── */
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .suggestion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }

    .suggestion-card:hover {
      border-color: var(--accent);
    }

    .suggestion-card .sg-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .suggestion-card .sg-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .suggestion-card .sg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cite-badge {
      font-size: 12px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .read-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .read-link:hover { color: var(--accent-hover); }

    /* ── Coverage Gaps ── */
    .gap-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .gap-item:last-child { border-bottom: none; }

    .gap-label {
      min-width: 200px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .gap-bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .gap-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .gap-priority {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      min-width: 70px;
      text-align: center;
    }

    .priority-high { background: rgba(239,68,68,0.15); color: var(--red); }
    .priority-medium { background: rgba(245,158,11,0.15); color: var(--amber); }
    .priority-low { background: rgba(34,197,94,0.15); color: var(--green); }

    /* ── Sources Tab ── */
    .sources-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }

    .sort-select {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .filter-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover, .filter-tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .sources-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sources-table th {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sources-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .sources-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .sources-table .title-cell {
      cursor: pointer;
      color: var(--accent);
      font-weight: 500;
      max-width: 350px;
    }

    .sources-table .title-cell:hover {
      text-decoration: underline;
    }

    .sources-table .authors-cell {
      color: var(--text-muted);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .abstract-row {
      display: none;
    }

    .abstract-row.visible {
      display: table-row;
    }

    .abstract-row td {
      padding: 16px 24px;
      background: rgba(99, 102, 241, 0.03);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-screened { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-reading { background: rgba(245,158,11,0.15); color: var(--amber); }
    .status-read { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-cited { background: rgba(168,85,247,0.15); color: var(--purple); }
    .status-excluded { background: rgba(113,113,122,0.15); color: #71717a; }

    .tag-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin: 2px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      white-space: nowrap;
    }

    .suggested-row {
      border-left: 3px solid var(--gold) !important;
    }

    .suggested-row td:first-child::before {
      content: "\2605 ";
      color: var(--gold);
    }

    .access-link {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .access-link:hover { text-decoration: underline; }

    /* ── Write Tab ── */
    .write-layout {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      gap: 20px;
      min-height: calc(100vh - 160px);
    }

    .write-sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-sidebar h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .chapter-group {
      margin-bottom: 16px;
    }

    .chapter-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      padding: 6px 0;
      cursor: default;
    }

    .section-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .section-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .section-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .write-main {
      display: flex;
      flex-direction: column;
    }

    .write-main .section-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .write-textarea {
      flex: 1;
      min-height: 400px;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
      font-family: 'Georgia', 'Times New Roman', serif;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .write-textarea:focus { border-color: var(--accent); }

    .write-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 12px;
    }

    .write-stats {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 20px;
    }

    .save-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover { background: var(--accent-hover); }

    .write-checks-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-checks-panel h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .check-card {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .check-americanism {
      background: rgba(239,68,68,0.1);
      border-left: 3px solid var(--red);
    }

    .check-uncited {
      background: rgba(245,158,11,0.1);
      border-left: 3px solid var(--amber);
    }

    .check-tone {
      background: rgba(59,130,246,0.1);
      border-left: 3px solid var(--blue);
    }

    .check-empty {
      color: var(--text-muted);
      font-style: italic;
      padding: 24px 0;
      text-align: center;
    }

    /* ── Quizzes Tab ── */
    .quiz-warning {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      color: var(--red);
      font-weight: 600;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .question-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .q-number {
      background: var(--accent);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .q-type-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .q-type-recall { background: rgba(59,130,246,0.15); color: var(--blue); }
    .q-type-comprehension { background: rgba(34,197,94,0.15); color: var(--green); }
    .q-type-application { background: rgba(245,158,11,0.15); color: var(--amber); }
    .q-type-comparison { background: rgba(168,85,247,0.15); color: var(--purple); }
    .q-type-critical_analysis { background: rgba(239,68,68,0.15); color: var(--red); }

    .q-source {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .question-text {
      font-size: 15px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .q-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
    }

    .q-textarea:focus { border-color: var(--accent); }

    .rubric-box {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .rubric-box .rubric-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .rubric-item {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      color: var(--text-muted);
    }

    .rubric-item .score-num {
      font-weight: 700;
      color: var(--accent);
      min-width: 16px;
    }

    .self-score-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .self-score-row label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .score-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .quiz-submit-btn {
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .quiz-submit-btn:hover { background: var(--accent-hover); }

    .quiz-result {
      text-align: center;

// ── Authentication ──
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin() {
  const input = document.getElementById('login-password').value;
  const hash = await hashPassword(input);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem(AUTH_KEY, 'true');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('app').style.display = 'none';

  document.getElementById('login-error').style.display = 'none';
}

function esc(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function formatChapterName(ch) {
  return ch.replace(/^ch\d+_?/, '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function formatFullDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function buildProgressRing(pct, size, strokeWidth, color) {
  var radius = (size - strokeWidth) / 2;
  var circumference = 2 * Math.PI * radius;
  var offset = circumference - (pct / 100) * circumference;
  return '<div class="progress-ring-container">' +
    '<svg width="' + size + '" height="' + size + '" class="progress-ring" style="transform:rotate(-90deg)">' +
    '<circle class="progress-ring-bg" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" stroke-width="' + strokeWidth + '"/>' +
    '<circle class="progress-ring-fill" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" stroke-width="' + strokeWidth + '" ' +
    'stroke="' + color + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" data-target-offset="' + offset + '"/>' +
    '</svg>' +
    '<div style="margin-top:-' + (size/2 + 10) + 'px;font-size:18px;font-weight:700;color:var(--text);text-align:center;">' + pct.toFixed(0) + '%</div>' +
    '<div style="height:' + (size/2 - 10) + 'px;"></div>' +
    '</div>';
}

function animateCountUp(el, target, duration) {
  var start = 0;
  var startTime = null;
  var isPercent = String(target).indexOf('%') !== -1;
  var numTarget = parseFloat(target);
  if (isNaN(numTarget)) { el.textContent = target; return; }
  var suffix = isPercent ? '%' : '';
  // Check if it has fire emoji
  var extraHtml = '';
  if (el.innerHTML && el.innerHTML.indexOf('&#128293;') !== -1) {
    extraHtml = ' &#128293;';
  }

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    var current = Math.round(eased * numTarget);
    el.innerHTML = current + suffix + extraHtml;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function buildSparkline(logs) {
  var today = new Date();
  var dayNames = ['S','M','T','W','T','F','S'];
  var bars = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var key = d.toISOString().split('T')[0];
    var log = logs[key];
    var mins = log ? (log.total_minutes || 0) : 0;
    bars.push({ mins: mins, day: dayNames[d.getDay()] });
  }
  var maxMins = Math.max.apply(null, bars.map(function(b) { return b.mins; }));
  if (maxMins === 0) maxMins = 1;

  var html = '<div class="sparkline-container">';
  bars.forEach(function(b) {
    var h = Math.max((b.mins / maxMins) * 28, 2);
    html += '<div class="sparkline-bar" style="height:' + h + 'px;" title="' + b.mins + ' min"></div>';
  });
  html += '</div>';
  html += '<div class="sparkline-labels">';
  bars.forEach(function(b) {
    html += '<span>' + b.day + '</span>';
  });
  html += '</div>';
  return html;
}

        '<div class="sg-footer">' +
        '<span class="cite-badge">' + (s.citation_count || 0) + ' citations</span>' +
        '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="read-link">Read &rarr;</a>' +
        '</div></div>';
    });
    html += '</div></div>';
  }

  // Coverage Gaps
  if (plan && plan.coverage_gaps && plan.coverage_gaps.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Coverage Gaps</h3>';
    plan.coverage_gaps.forEach(gap => {
      const pct = gap.target > 0 ? Math.min((gap.read_count / gap.target) * 100, 100) : 0;
      const prioClass = gap.priority === 'high' ? 'priority-high' : gap.priority === 'medium' ? 'priority-medium' : 'priority-low';
      const barColor = gap.priority === 'high' ? 'var(--red)' : gap.priority === 'medium' ? 'var(--amber)' : 'var(--green)';
      html += '<div class="gap-item">' +
        '<span class="gap-label">' + esc(formatChapterName(gap.chapter)) + '</span>' +
        '<div class="gap-bar-track"><div class="gap-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
        '<span>' + gap.read_count + '/' + gap.target + '</span>' +
        '<span class="gap-priority ' + prioClass + '">' + esc(gap.priority) + '</span>' +
        '</div>';
    });
    html += '</div>';
  }

  // Charts: Sources by Year and Sources by Status
  html += '<div class="two-col">';

  // Sources by Year
  html += '<div class="card"><h3>Sources by Year</h3><div class="bar-chart">';
  const byYear = stats.by_year || {};
  const maxYear = Math.max(...Object.values(byYear), 1);
  Object.entries(byYear).sort((a,b) => a[0].localeCompare(b[0])).forEach(([year, count]) => {
    const pct = (count / maxYear) * 100;
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + year + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  // Sources by Status
  html += '<div class="card"><h3>Sources by Status</h3><div class="bar-chart">';
  const byStatus = stats.by_status || {};
  const maxStatus = Math.max(...Object.values(byStatus), 1);
  const statusColors = { screened: 'var(--blue)', reading: 'var(--amber)', read: 'var(--green)', cited: 'var(--purple)', excluded: '#71717a' };
  Object.entries(byStatus).forEach(([status, count]) => {
    const pct = (count / maxStatus) * 100;
    const color = statusColors[status] || 'var(--accent)';
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  html += '</div>'; // close two-col

  document.getElementById('tab-dashboard').innerHTML = html;

  // Animate count-up on stat values
  document.querySelectorAll('[data-count-target]').forEach(function(el) {
    var target = parseInt(el.dataset.countTarget);
    if (!isNaN(target) && target > 0) {
      animateCountUp(el, target, 600);
    }
  });
}

function setTagFilter(btn) {
  document.querySelectorAll('#filter-tags .filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window._activeTag = btn.dataset.tag;
  filterSources();
}

function filterSources() {
  const search = (document.getElementById('source-search').value || '').toLowerCase();
  const sort = document.getElementById('source-sort').value;
  const tag = window._activeTag || 'all';
  const sugDois = window._suggestedDois || new Set();

  let filtered = (window._sources || []).filter(s => {
    if (s.status === 'excluded') return false;
    if (tag !== 'all' && !(s.relevance_tags || []).includes(tag)) return false;
    if (search) {
      const haystack = [s.title, (s.authors || []).join(' '), s.venue, s.doi].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  if (sort === 'citations') filtered.sort((a,b) => (b.citation_count || 0) - (a.citation_count || 0));
  else if (sort === 'year') filtered.sort((a,b) => b.year - a.year);
  else if (sort === 'title') filtered.sort((a,b) => (a.title || '').localeCompare(b.title || ''));

  let html = '';
  filtered.forEach((s, i) => {
    const isSuggested = sugDois.has(s.doi);
    const rowClass = isSuggested ? 'suggested-row' : '';
    const authors = Array.isArray(s.authors) ? s.authors.slice(0, 3).join(', ') + (s.authors.length > 3 ? ' et al.' : '') : '';
    const statusClass = 'status-' + (s.status || 'screened');
    const link = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '');
    const tagPills = (s.relevance_tags || []).map(t => '<span class="tag-pill">' + esc(t.replace(/_/g, ' ')) + '</span>').join('');

    html += '<tr class="' + rowClass + '">' +
      '<td class="title-cell" onclick="toggleAbstract(' + i + ')">' + esc(s.title) + '</td>' +
      '<td class="authors-cell" title="' + esc((s.authors || []).join(', ')) + '">' + esc(authors) + '</td>' +
      '<td>' + (s.year || '') + '</td>' +
      '<td>' + (s.citation_count || 0) + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + esc(s.status || 'screened') + '</span></td>' +
      '<td>' + tagPills + '</td>' +
      '<td>' + (link ? '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="access-link">Open</a>' : '-') + '</td>' +
      '</tr>';

    html += '<tr class="abstract-row" id="abstract-' + i + '"><td colspan="7">' +
      (s.abstract ? esc(s.abstract).substring(0, 600) + (s.abstract.length > 600 ? '...' : '') : '<em>No abstract available</em>') +
      '</td></tr>';
  });

  document.getElementById('sources-tbody').innerHTML = html;
}

  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const pct = guide.targetWords > 0 ? Math.min((words / guide.targetWords) * 100, 100) : 0;
  const progressColor = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--accent)';

  let html = '<div class="writing-guide">';
  html += '<div class="writing-guide-purpose">' + esc(guide.purpose) + '</div>';
  html += '<h4>Structure</h4><ol class="writing-guide-steps">';
  guide.structure.forEach(function(step) {
    html += '<li>' + esc(step) + '</li>';
  });

  html += '<h4>Target Word Count</h4>';
  html += '<div class="writing-guide-progress">' +
    '<div class="wg-progress-track"><div class="wg-progress-fill" style="width:' + pct.toFixed(0) + '%;background:' + progressColor + '"></div></div>' +
    '<span class="wg-progress-label">' + words + ' / ' + guide.targetWords + ' words</span></div>';

  return html;

  let firstSectionTitle = null;

  structure.chapters.forEach(ch => {
    sidebarHtml += '<div class="chapter-group"><div class="chapter-title">' + esc(ch.id.toUpperCase().replace('CH', 'Ch ')) + ': ' + esc(ch.title) + '</div>';
    (ch.sections || []).forEach(sec => {
      if (!firstSectionId) { firstSectionId = sec.id; firstSectionTitle = sec.id + ' — ' + sec.title; }
      sidebarHtml += '<button class="section-btn" data-section="' + esc(sec.id) + '" data-title="' + esc(sec.id + ' — ' + sec.title) + '" onclick="selectSection(this)">' +
        esc(sec.id) + ' ' + esc(sec.title) + '</button>';
    });
    sidebarHtml += '</div>';
  });

  const html = '<div class="write-layout">' +
    '<div class="write-sidebar">' + sidebarHtml + '</div>' +
    '<div class="write-main">' +
    '<div class="section-header" id="write-section-header">' + esc(firstSectionTitle || 'Select a section') + '</div>' +
    '<div id="write-guide-container"></div>' +
    '<textarea class="write-textarea" id="write-textarea" placeholder="Start writing..." oninput="debouncedWriteCheck()"></textarea>' +
    '<div class="write-footer">' +
    '<div class="write-stats"><span id="write-word-count">0 words</span><span id="write-citation-count">0 citations</span><span id="write-issues-badge"></span></div>' +
    '<button class="save-btn" onclick="saveDraft()">Save Draft</button>' +
    '</div></div>' +
    '<div class="write-checks-panel"><h3>Writing Checks <span id="checks-count-header"></span></h3><div id="live-checks-container"><div class="check-empty">Start typing to see real-time writing checks</div></div></div>' +
    '</div>';

  document.getElementById('tab-write').innerHTML = html;

  // Select first section
  if (firstSectionId) {
    const firstBtn = document.querySelector('.section-btn[data-section="' + firstSectionId + '"]');
    if (firstBtn) firstBtn.classList.add('active');
    window._currentSection = firstSectionId;
    loadDraft(firstSectionId);
  }
}

function selectSection(btn) {
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sectionId = btn.dataset.section;
  const title = btn.dataset.title;
  window._currentSection = sectionId;
  document.getElementById('write-section-header').textContent = title;
  loadDraft(sectionId);
}

function loadDraft(sectionId) {
  const key = 'draft-' + sectionId;
  const content = localStorage.getItem(key) || '';
  document.getElementById('write-textarea').value = content;
  // Render guide for the selected section
  const guideContainer = document.getElementById('write-guide-container');
  if (guideContainer) guideContainer.innerHTML = buildWritingGuideHtml(sectionId);
  updateWriteStats();
  checkWritingRealtime();
}

function saveDraft() {
  const sectionId = window._currentSection;
  if (!sectionId) return;
  const content = document.getElementById('write-textarea').value;
  localStorage.setItem('draft-' + sectionId, content);
  showToast('Draft saved for section ' + sectionId);
}

function debouncedWriteCheck() {
  if (_writeCheckDebounceTimer) clearTimeout(_writeCheckDebounceTimer);
  _writeCheckDebounceTimer = setTimeout(function() {
    updateWriteStats();
    checkWritingRealtime();
    // Update guide word progress
    var guideContainer = document.getElementById('write-guide-container');
    if (guideContainer && window._currentSection) {
      guideContainer.innerHTML = buildWritingGuideHtml(window._currentSection);
    }
  }, 500);
}

function updateWriteStats() {
  const textarea = document.getElementById('write-textarea');
  if (!textarea) return;
  const text = textarea.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const citations = (text.match(/\([^)]*\d{4}[^)]*\)/g) || []).length;
  document.getElementById('write-word-count').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('write-citation-count').textContent = citations + ' citation' + (citations !== 1 ? 's' : '');
  // Issues badge is updated by checkWritingRealtime
}

function checkWritingRealtime() {
  const textarea = document.getElementById('write-textarea');
  if (!textarea) return;
  const text = textarea.value;
  const container = document.getElementById('live-checks-container');
  if (!container) return;

  if (!text.trim()) {
    container.innerHTML = '<div class="check-empty">Start typing to see real-time writing checks</div>';
    updateIssuesBadge(0);
    return;
  }

  const issues = [];
  const lines = text.split('\n');

  // 1. Check for Americanisms
  lines.forEach(function(line, lineIdx) {
    var wordsInLine = line.toLowerCase().split(/\b/);
    for (var w = 0; w < wordsInLine.length; w++) {
      var word = wordsInLine[w].trim();
      if (AMERICAN_TO_BRITISH[word]) {
        issues.push({
          type: 'americanism',
          text: '"' + word + '" is American English',
          suggestion: 'Use "' + AMERICAN_TO_BRITISH[word] + '" instead',
          line: lineIdx + 1
        });
      }
    }
  });

  // 2. Check for contractions
  lines.forEach(function(line, lineIdx) {
    var lower = line.toLowerCase();
    Object.keys(CONTRACTIONS).forEach(function(contraction) {
      var regex = new RegExp('\\b' + contraction.replace("'", "[\\u2019']") + '\\b', 'gi');
      if (regex.test(lower)) {
        issues.push({
          type: 'contraction',
          text: 'Contraction "' + contraction + '" found',
          suggestion: 'Use "' + CONTRACTIONS[contraction] + '" in academic writing',
          line: lineIdx + 1
        });
      }
    });
  });

  // 3. Check for informal words
  lines.forEach(function(line, lineIdx) {
    var lower = line.toLowerCase();
    Object.keys(INFORMAL_WORDS).forEach(function(informal) {
      var regex = new RegExp('\\b' + informal + '\\b', 'gi');
      if (regex.test(lower)) {
        issues.push({
          type: 'tone',
          text: '"' + informal + '" is informal',
          suggestion: 'Consider "' + INFORMAL_WORDS[informal] + '"',
          line: lineIdx + 1
        });
      }
    });
  });

  // 4. Check for first person pronouns (not inside citations)
  lines.forEach(function(line, lineIdx) {
    // Remove citation brackets before checking
    var stripped = line.replace(/\[[^\]]*\]/g, '').replace(/\([^)]*\d{4}[^)]*\)/g, '');
    var pronounRegex = /\b(I|my|me|mine)\b/g;
    var match;
    while ((match = pronounRegex.exec(stripped)) !== null) {
      // Skip "I" if it's part of abbreviations like "IK" or "IFK"
      if (match[1] === 'I' && stripped[match.index + 1] && /[A-Z]/.test(stripped[match.index + 1])) continue;
      issues.push({
        type: 'tone',
        text: 'First person pronoun "' + match[1] + '" detected',
        suggestion: 'Use third person or passive voice in academic writing',
        line: lineIdx + 1
      });
    }
  });

  // 5. Check for uncited assertions
  var assertionPatterns = /\b(has been|have been|shows that|show that|indicates|indicate|suggests|suggest|is important|is critical|is essential|are important|are critical|are essential)\b/gi;
  lines.forEach(function(line, lineIdx) {
    var match;
    var testLine = line;
    assertionPatterns.lastIndex = 0;
    while ((match = assertionPatterns.exec(testLine)) !== null) {
      // Check if there is a citation in this sentence
      var sentenceEnd = testLine.indexOf('.', match.index);
      if (sentenceEnd === -1) sentenceEnd = testLine.length;
      var sentenceChunk = testLine.substring(Math.max(0, match.index - 80), sentenceEnd);
      var hasCitation = /\[\d+\]/.test(sentenceChunk) || /\([^)]*\d{4}[^)]*\)/.test(sentenceChunk);
      if (!hasCitation) {
        issues.push({
          type: 'uncited',
          text: 'Possible uncited assertion: "...' + match[0] + '..."',
          suggestion: 'Add a citation to support this claim',
          line: lineIdx + 1
        });
      }
    }
  });

  // 6. Check for sentences starting with And/But/So
  lines.forEach(function(line, lineIdx) {
    var trimmed = line.trim();
    if (/^(And|But|So)\b/.test(trimmed)) {
      issues.push({
        type: 'tone',
        text: 'Sentence starts with "' + trimmed.split(/\s/)[0] + '"',
        suggestion: 'Avoid starting sentences with conjunctions in formal writing',
        line: lineIdx + 1
      });
    }
    // Also check after full stops
    var sentences = line.split(/\.\s+/);
    for (var s = 1; s < sentences.length; s++) {
      if (/^(And|But|So)\b/.test(sentences[s].trim())) {
        issues.push({
          type: 'tone',
          text: 'Sentence starts with "' + sentences[s].trim().split(/\s/)[0] + '"',
          suggestion: 'Avoid starting sentences with conjunctions in formal writing',
          line: lineIdx + 1
        });
      }
    }
  });

  // 7. Check for exclamation marks
  lines.forEach(function(line, lineIdx) {
    if (line.indexOf('!') !== -1) {
      issues.push({
        type: 'tone',
        text: 'Exclamation mark found',
        suggestion: 'Exclamation marks are not appropriate in academic writing',
        line: lineIdx + 1
      });
    }
  });

  // Render issues
  if (issues.length === 0) {
    container.innerHTML = '<div class="check-empty" style="color:var(--green);">No issues found. Looking good!</div>';
  } else {
    var html = '';
    var typeColors = {
      americanism: 'var(--red)',
      uncited: 'var(--amber)',
      tone: 'var(--blue)',
      contraction: 'var(--purple)'
    };
    var typeClasses = {
      americanism: 'check-americanism',
      uncited: 'check-uncited',
      tone: 'check-tone',
      contraction: 'check-contraction'
    };
    issues.forEach(function(issue) {
      var dotColor = typeColors[issue.type] || 'var(--text-muted)';
      var cardClass = typeClasses[issue.type] || 'check-tone';
      html += '<div class="check-card ' + cardClass + '">' +
        '<span class="check-line-num">Line ' + issue.line + '</span>' +
        '<span class="check-dot" style="background:' + dotColor + '"></span>' +
        '<strong>' + esc(issue.text) + '</strong>' +
        '<div class="check-suggestion">' + esc(issue.suggestion) + '</div>' +
        '</div>';
    });
    container.innerHTML = html;
  }

  updateIssuesBadge(issues.length);
}

function updateIssuesBadge(count) {
  var badge = document.getElementById('write-issues-badge');
  if (!badge) return;
  if (count === 0) {
    badge.innerHTML = '<span class="issues-badge badge-green">0 issues</span>';
  } else if (count <= 5) {
    badge.innerHTML = '<span class="issues-badge badge-amber">' + count + ' issue' + (count !== 1 ? 's' : '') + '</span>';
  } else {
    badge.innerHTML = '<span class="issues-badge badge-red">' + count + ' issue' + (count !== 1 ? 's' : '') + '</span>';
  }
  // Also update the checks panel header
  var checksHeader = document.getElementById('checks-count-header');
  if (checksHeader) {
    checksHeader.textContent = '(' + count + ')';
  }
}

// ── QUIZZES TAB ──
function renderQuizzes() {
  const quizzes = DATA.quizzes || [];
  const penalty = DATA.streak_penalty;
  let html = '';

  // Redo warning
  if (penalty && penalty.must_redo_quizzes) {
    html += '<div class="quiz-warning">&#9888; Streak broken! You must redo all quizzes.</div>';
  }

  if (quizzes.length > 0) {
    const quiz = quizzes[0];
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz' +
      (quiz.quiz_type ? ' — ' + esc(quiz.quiz_type) : '') + '</h3>';

    const questions = quiz.questions || [];
    const maxScore = questions.reduce((sum, q) => {
      const rubric = q.scoring_rubric || {};
      return sum + Math.max(...Object.keys(rubric).map(Number).filter(n => !isNaN(n)), 5);
    }, 0);

    questions.forEach((q, i) => {
      const typeClass = 'q-type-' + (q.type || 'recall').replace(/\s+/g, '_');
      html += '<div class="question-card">' +
        '<div class="question-header">' +
        '<span class="q-number">' + (i + 1) + '</span>' +
        '<span class="q-type-badge ' + typeClass + '">' + esc(q.type || 'recall') + '</span>' +
        (q.difficulty ? '<span style="color:var(--text-muted);font-size:12px;">Difficulty: ' + esc(q.difficulty) + '</span>' : '') +
        '</div>';

      if (q.source_title) {
        html += '<div class="q-source">Source: ' + esc(q.source_title) + '</div>';
      }

      html += '<div class="question-text">' + esc(q.question) + '</div>' +
        '<textarea class="q-textarea" id="q-answer-' + i + '" placeholder="Type your answer..."></textarea>';

      // Rubric
      if (q.scoring_rubric && Object.keys(q.scoring_rubric).length > 0) {
        html += '<div class="rubric-box"><div class="rubric-title">Scoring Rubric</div>';
        Object.entries(q.scoring_rubric).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([score, desc]) => {
          html += '<div class="rubric-item"><span class="score-num">' + score + '</span><span>' + esc(desc) + '</span></div>';
        });
        html += '</div>';
      }

      // Self-score dropdown
      const maxQ = q.scoring_rubric ? Math.max(...Object.keys(q.scoring_rubric).map(Number).filter(n => !isNaN(n)), 5) : 5;
      html += '<div class="self-score-row"><label>Self-score:</label><select class="score-select" id="q-score-' + i + '">' +
        '<option value="">--</option>';
      for (let s = 0; s <= maxQ; s++) {
        html += '<option value="' + s + '">' + s + '</option>';
      }
      html += '</select></div></div>';
    });

    html += '<button class="quiz-submit-btn" onclick="submitQuiz()">Submit Quiz</button>' +
      '<div class="quiz-result" id="quiz-result"></div></div>';

    // Writing prompt
    if (quiz.writing_prompt) {
      html += '<div class="card writing-prompt-section" style="margin-bottom:24px;"><h3>Writing Assignment</h3>' +
        '<div class="prompt-text">' + esc(quiz.writing_prompt) + '</div>' +
        '<textarea class="q-textarea" id="writing-prompt-answer" style="min-height:300px;" placeholder="Write your response (500-1000 words)..." oninput="updateWritingWordCount()"></textarea>' +
        '<div class="word-count-tracker" id="writing-word-count">0 / 500-1000 words</div></div>';
    }
  } else {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Active Quiz</h3>' +
      '<div class="empty-state">No quizzes available yet. Complete a reading session to generate a quiz.</div></div>';
  }

  // Score History
  html += '<div class="card score-history-section"><h3>Score History</h3>';
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  if (scores.length > 0) {
    html += '<ul class="score-list">';
    scores.slice().reverse().forEach(s => {
      const pct = s.max_score > 0 ? Math.round((s.score / s.max_score) * 100) : 0;
      const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      html += '<li><span>' + esc(s.date) + '</span><span>' + esc(s.quiz_type || 'Quiz') + '</span>' +
        '<span style="font-weight:600;">' + s.score + '/' + s.max_score + ' (' + pct + '%)</span>' +
        '<div class="score-bar-mini"><div class="score-bar-mini-fill" style="width:' + pct + '%;background:' + color + '"></div></div></li>';
    });
    html += '</ul>';
  } else {
    html += '<div class="empty-state">No scores recorded yet.</div>';
  }
  html += '</div>';

  document.getElementById('tab-quizzes').innerHTML = html;
}

function submitQuiz() {
  const quiz = DATA.quizzes[0];
  if (!quiz) return;
  const questions = quiz.questions || [];
  let totalScore = 0;
  let maxScore = 0;

  questions.forEach((q, i) => {
    const sel = document.getElementById('q-score-' + i);
    const val = sel ? parseInt(sel.value) : 0;
    totalScore += isNaN(val) ? 0 : val;
    const maxQ = q.scoring_rubric ? Math.max(...Object.keys(q.scoring_rubric).map(Number).filter(n => !isNaN(n)), 5) : 5;
    maxScore += maxQ;
  });

  const pct = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';

  const resultDiv = document.getElementById('quiz-result');
  resultDiv.style.display = 'block';
  resultDiv.style.background = color.replace('var(', '').replace(')', '') === '--green'
    ? 'rgba(34,197,94,0.15)' : color === 'var(--amber)' ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.15)';
  resultDiv.style.color = color;
  resultDiv.innerHTML = totalScore + '/' + maxScore + '<div class="pct">' + pct + '%</div>';

  // Save to localStorage
  const scores = JSON.parse(localStorage.getItem(QUIZ_SCORES_KEY) || '[]');
  scores.push({
    date: new Date().toISOString().split('T')[0],
    quiz_type: quiz.quiz_type || 'Quiz',
    score: totalScore,
    max_score: maxScore
  });
  localStorage.setItem(QUIZ_SCORES_KEY, JSON.stringify(scores));

  showToast('Quiz submitted! Score: ' + pct + '%');
}

  const text = document.getElementById('writing-prompt-answer').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;

// ── TIMELINE TAB ──
function renderTimeline() {
  const milestones = (DATA.timeline && DATA.timeline.milestones) || [];
  if (milestones.length === 0) {
    document.getElementById('tab-timeline').innerHTML = '<div class="empty-state">No milestones defined.</div>';
    return;
  }

  const now = new Date();
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  const catClass = { reading: 'cat-reading', writing: 'cat-writing', development: 'cat-development', review: 'cat-review' };

  let html = '<div class="timeline-container">';
  milestones.forEach(m => {
    const mDate = new Date(m.date + 'T00:00:00');
    const diff = mDate - now;
    let dotClass = 'future';
    if (diff < 0) dotClass = 'past';
    else if (diff <= weekMs) dotClass = 'current';

    html += '<div class="milestone">' +
      '<div class="milestone-dot ' + dotClass + '"></div>' +
      '<div class="milestone-date">' + formatDate(m.date) + '</div>' +
      '<div class="milestone-label">' + esc(m.label) + '</div>' +
      '<span class="milestone-category ' + (catClass[m.category] || 'cat-review') + '">' + esc(m.category) + '</span>' +
      '</div>';
  });
  html += '</div>';

  document.getElementById('tab-timeline').innerHTML = html;
}

  // Streak History
  const sh = report.streak_history || {};
  html += '<div class="card" style="margin-bottom:24px;"><h3>Streak History</h3>' +
    '<div style="display:flex;gap:40px;margin-bottom:12px;">' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.current_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Current</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:var(--accent);">' + (sh.longest_streak || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Longest</div></div>' +
    '<div><div style="font-size:28px;font-weight:700;color:' + ((sh.missed_days_this_week || 0) > 0 ? 'var(--red)' : 'var(--green)') + ';">' + (sh.missed_days_this_week || 0) + '</div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Missed This Week</div></div>' +
    '</div>';
  if (sh.missed_dates && sh.missed_dates.length > 0) {
    html += '<div style="font-size:13px;color:var(--text-muted);">Missed: ' + sh.missed_dates.map(d => formatFullDate(d)).join(', ') + '</div>';
  }
  html += '</div>';

  // Recommendations
  if (report.recommendations && report.recommendations.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Recommendations</h3><ol class="recommendations-list">';
    report.recommendations.forEach(r => { html += '<li>' + esc(r) + '</li>'; });
    html += '</ol></div>';
  }

  // Past Reports accordion
  if (history.length > 0) {
    html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;margin-top:32px;">Past Reports</h2>';
    html += '<div class="accordion">';
    history.forEach((pr, idx) => {
      if (pr.week === report.week) return; // Skip current
      html += '<div class="accordion-header" onclick="toggleAccordion(this)">' +
        '<span>Week ' + esc(pr.week || 'Unknown') + '</span><span class="arrow">&#9660;</span></div>' +
        '<div class="accordion-body" id="past-report-' + idx + '">';

      const prp = pr.reading_pace || {};
      const pqt = pr.quiz_trends || {};
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">' +
        '<div>' + progressBar('Papers', prp.papers_read || 0, prp.target_papers || 5, prp.on_track ? 'var(--green)' : 'var(--red)') + '</div>' +
        '<div>' + progressBar('Quiz avg', pqt.average_score_pct || 0, 100, pqt.above_target ? 'var(--green)' : 'var(--red)') + '</div>' +
        '</div>';

      if (pr.recommendations && pr.recommendations.length > 0) {
        html += '<ul style="padding-left:20px;font-size:13px;color:var(--text-muted);">';
        pr.recommendations.forEach(r => { html += '<li style="margin-bottom:4px;">' + esc(r) + '</li>'; });
        html += '</ul>';
      }

      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-reports').innerHTML = html;
}

function progressBar(label, value, max, color) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  return '<div class="progress-bar-container">' +
    '<div class="progress-label"><span>' + esc(label) + '</span><span>' + value + ' / ' + max + '</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>';
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}
</script>
</body>
</html>
