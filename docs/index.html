<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Agent Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --gold: #eab308;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(rgba(15,17,23,0.85), rgba(15,17,23,0.92)), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1920&q=80') center/cover no-repeat;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-card h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: var(--accent);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: var(--accent-hover);
    }

    .login-error {
      color: var(--red);
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }

    /* ── App Shell ── */
    #app {
      display: none;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 14px;
    }

    #logout-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-nav button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-nav button:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .tab-nav button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Tab Content ── */
    .tab-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab { display: none; }
    .tab.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-card .stat-label {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Streak Penalty Banner ── */
    .penalty-banner {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--red);
      font-weight: 500;
    }

    .penalty-banner .icon { font-size: 24px; }

    /* ── Grid Layouts ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    /* ── Bar Charts ── */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      min-width: 100px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 24px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--accent);
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .bar-value {
      min-width: 36px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
    }

    /* ── Focus Notes ── */
    .focus-list {
      list-style: none;
      counter-reset: focus;
    }

    .focus-list li {
      counter-increment: focus;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .focus-list li:last-child { border-bottom: none; }

    .focus-list li::before {
      content: counter(focus);
      background: var(--accent);
      color: #fff;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Suggestion Cards ── */
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .suggestion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }

    .suggestion-card:hover {
      border-color: var(--accent);
    }

    .suggestion-card .sg-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .suggestion-card .sg-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .suggestion-card .sg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cite-badge {
      font-size: 12px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .read-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .read-link:hover { color: var(--accent-hover); }

    /* ── Coverage Gaps ── */
    .gap-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .gap-item:last-child { border-bottom: none; }

    .gap-label {
      min-width: 200px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .gap-bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .gap-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .gap-priority {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      min-width: 70px;
      text-align: center;
    }

    .priority-high { background: rgba(239,68,68,0.15); color: var(--red); }
    .priority-medium { background: rgba(245,158,11,0.15); color: var(--amber); }
    .priority-low { background: rgba(34,197,94,0.15); color: var(--green); }

    /* ── Sources Tab ── */
    .sources-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }

    .sort-select {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .filter-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover, .filter-tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .sources-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sources-table th {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sources-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .sources-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .sources-table .title-cell {
      cursor: pointer;
      color: var(--accent);
      font-weight: 500;
      max-width: 350px;
    }

    .sources-table .title-cell:hover {
      text-decoration: underline;
    }

    .sources-table .authors-cell {
      color: var(--text-muted);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .abstract-row {
      display: none;
    }

    .abstract-row.visible {
      display: table-row;
    }

    .abstract-row td {
      padding: 16px 24px;
      background: rgba(99, 102, 241, 0.03);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-screened { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-reading { background: rgba(245,158,11,0.15); color: var(--amber); }
    .status-read { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-cited { background: rgba(168,85,247,0.15); color: var(--purple); }
    .status-excluded { background: rgba(113,113,122,0.15); color: #71717a; }

    .tag-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin: 2px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      white-space: nowrap;
    }

    .suggested-row {
      border-left: 3px solid var(--gold) !important;
    }

    .suggested-row td:first-child::before {
      content: "\2605 ";
      color: var(--gold);
    }

    .access-link {
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .access-link:hover { text-decoration: underline; }

    /* ── Write Tab ── */
    .write-layout {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      gap: 20px;
      min-height: calc(100vh - 160px);
    }

    .write-sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-sidebar h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .chapter-group {
      margin-bottom: 16px;
    }

    .chapter-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      padding: 6px 0;
      cursor: default;
    }

    .section-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .section-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }

    .section-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .write-main {
      display: flex;
      flex-direction: column;
    }

    .write-main .section-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .write-textarea {
      flex: 1;
      min-height: 400px;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
      font-family: 'Georgia', 'Times New Roman', serif;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .write-textarea:focus { border-color: var(--accent); }

    .write-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 12px;
    }

    .write-stats {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 20px;
    }

    .save-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover { background: var(--accent-hover); }

    .write-checks-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .write-checks-panel h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .check-card {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .check-americanism {
      background: rgba(239,68,68,0.1);
      border-left: 3px solid var(--red);
    }

    .check-uncited {
      background: rgba(245,158,11,0.1);
      border-left: 3px solid var(--amber);
    }

    .check-tone {
      background: rgba(59,130,246,0.1);
      border-left: 3px solid var(--blue);
    }

    .check-empty {
      color: var(--text-muted);
      font-style: italic;
      padding: 24px 0;
      text-align: center;
    }

    /* ── Quizzes Tab ── */
    .quiz-warning {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      color: var(--red);
      font-weight: 600;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .question-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .q-number {
      background: var(--accent);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .q-type-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .q-type-recall { background: rgba(59,130,246,0.15); color: var(--blue); }
    .q-type-comprehension { background: rgba(34,197,94,0.15); color: var(--green); }
    .q-type-application { background: rgba(245,158,11,0.15); color: var(--amber); }
    .q-type-comparison { background: rgba(168,85,247,0.15); color: var(--purple); }
    .q-type-critical_analysis { background: rgba(239,68,68,0.15); color: var(--red); }

    .q-source {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .question-text {
      font-size: 15px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .q-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
    }

    .q-textarea:focus { border-color: var(--accent); }

    .rubric-box {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .rubric-box .rubric-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .rubric-item {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      color: var(--text-muted);
    }

    .rubric-item .score-num {
      font-weight: 700;
      color: var(--accent);
      min-width: 16px;
    }

    .quiz-submit-btn {
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .quiz-submit-btn:hover { background: var(--accent-hover); }

    .quiz-result {
      text-align: center;
      padding: 24px;
      border-radius: var(--radius);
      margin-top: 16px;
      font-size: 24px;
      font-weight: 700;
      display: none;
    }

    .quiz-result .pct { font-size: 18px; font-weight: 400; margin-top: 4px; }

    .writing-prompt-section {
      margin-top: 32px;
    }

    .writing-prompt-section .prompt-text {
      background: rgba(99,102,241,0.08);
      border-left: 4px solid var(--accent);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
      font-size: 15px;
      line-height: 1.6;
    }

    .word-count-tracker {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .score-history-section {
      margin-top: 32px;
    }

    .score-list {
      list-style: none;
    }

    .score-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .score-list li:last-child { border-bottom: none; }

    .score-bar-mini {
      width: 120px;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .score-bar-mini-fill {
      height: 100%;
      border-radius: 4px;
    }

    /* ── Timeline Tab ── */
    .timeline-container {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      padding-left: 40px;
    }

    .timeline-container::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .milestone {
      position: relative;
      margin-bottom: 32px;
      padding-left: 24px;
    }

    .milestone-dot {
      position: absolute;
      left: -32px;
      top: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--bg);
    }

    .milestone-dot.past {
      background: var(--green);
      border-color: var(--green);
    }

    .milestone-dot.current {
      background: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }

    .milestone-dot.future {
      background: var(--border);
      border-color: var(--border);
    }

    .milestone-date {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .milestone-label {
      font-size: 16px;
      font-weight: 600;
    }

    .milestone-category {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .cat-reading { background: rgba(59,130,246,0.15); color: var(--blue); }
    .cat-writing { background: rgba(168,85,247,0.15); color: var(--purple); }
    .cat-development { background: rgba(34,197,94,0.15); color: var(--green); }
    .cat-review { background: rgba(245,158,11,0.15); color: var(--amber); }

    /* ── Notes Tab ── */
    .notes-section { margin-bottom: 32px; }

    .notes-section h2 {
      font-size: 20px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .focus-notes-day {
      margin-bottom: 24px;
    }

    .focus-notes-day h4 {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .reading-note-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .reading-note-card h4 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .reading-note-card .note-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .reading-note-card .note-field {
      margin-bottom: 12px;
    }

    .reading-note-card .note-field-label {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .reading-note-card ul {
      padding-left: 20px;
    }

    .reading-note-card li {
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Reports Tab ── */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .progress-bar-container {
      margin-bottom: 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress-label span:first-child { color: var(--text-muted); }
    .progress-label span:last-child { font-weight: 600; }

    .progress-track {
      height: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }

    .coverage-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .coverage-table th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .coverage-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .needs-attention-row {
      color: var(--red);
    }

    .recommendations-list {
      list-style: none;
      counter-reset: recs;
    }

    .recommendations-list li {
      counter-increment: recs;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      gap: 12px;
    }

    .recommendations-list li:last-child { border-bottom: none; }

    .recommendations-list li::before {
      content: counter(recs);
      background: var(--accent);
      color: #fff;
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .accordion {
      margin-top: 24px;
    }

    .accordion-header {
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .accordion-header .arrow {
      transition: transform 0.2s;
    }

    .accordion-header.open .arrow {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      margin-bottom: 8px;
      margin-top: -8px;
    }

    .accordion-body.open {
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .write-layout {
        grid-template-columns: 1fr;
      }
      .write-sidebar, .write-checks-panel {
        max-height: none;
      }
      .two-col, .report-grid {
        grid-template-columns: 1fr;
      }
      .three-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .tab-content { padding: 16px; }
      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }
      .suggestions-grid {
        grid-template-columns: 1fr;
      }
      .sources-table {
        font-size: 12px;
      }
      .sources-table th, .sources-table td {
        padding: 8px;
      }
      .gap-label {
        min-width: 120px;
        font-size: 12px;
      }
      .bar-label {
        min-width: 60px;
        font-size: 12px;
      }
      header {
        padding: 0 12px;
      }
      .tab-nav {
        padding: 8px 12px;
      }
    }

    @media (max-width: 480px) {
      .stat-grid {
        grid-template-columns: 1fr;
      }
      .login-card {
        padding: 32px 24px;
        margin: 16px;
      }
      .tab-nav button {
        padding: 8px 10px;
        font-size: 12px;
      }
      .tab-nav button svg {
        display: none;
      }
      .tab-content {
        padding: 12px;
      }
      header {
        padding: 0 8px;
        gap: 4px;
        flex-wrap: wrap;
        height: auto;
        padding-top: 8px;
        padding-bottom: 8px;
      }
      #live-clock {
        font-size: 11px !important;
      }
      #logout-btn {
        font-size: 11px;
        padding: 4px 8px;
      }
      .reader-header {
        flex-wrap: wrap;
        gap: 8px;
      }
      .reader-header h3 {
        width: 100%;
        white-space: normal;
      }
      .two-col, .three-col {
        grid-template-columns: 1fr;
      }
      .question-card {
        padding: 12px;
      }
      .suggestions-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }

    /* ── Table responsive wrapper ── */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .saved-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Progress Ring ── */
    .progress-ring-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(99, 102, 241, 0.15);
    }

    .progress-ring-fill {
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s ease;
    }

    .progress-ring-text {
      font-size: 18px;
      font-weight: 700;
      fill: var(--text);
      text-anchor: middle;
      dominant-baseline: central;
    }

    /* ── Animated Stat Values ── */
    .stat-card .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    /* ── Sparkline Bars ── */
    .sparkline-container {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 30px;
      margin-top: 8px;
      justify-content: center;
    }

    .sparkline-bar {
      width: 12px;
      border-radius: 3px 3px 0 0;
      background: var(--accent);
      transition: height 0.4s ease;
      min-height: 2px;
      opacity: 0.6;
    }

    .sparkline-bar:last-child {
      opacity: 1;
      background: var(--green);
    }

    .sparkline-labels {
      display: flex;
      gap: 3px;
      justify-content: center;
      margin-top: 2px;
    }

    .sparkline-labels span {
      width: 12px;
      text-align: center;
      font-size: 9px;
      color: var(--text-muted);
    }

    /* ── Writing Guide Card ── */
    .writing-guide {
      background: rgba(99, 102, 241, 0.06);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .writing-guide-purpose {
      background: rgba(99, 102, 241, 0.1);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
      color: var(--text);
    }

    .writing-guide h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .writing-guide-steps {
      list-style: none;
      counter-reset: guide-step;
      margin-bottom: 12px;
    }

    .writing-guide-steps li {
      counter-increment: guide-step;
      font-size: 13px;
      line-height: 1.5;
      padding: 4px 0;
      padding-left: 28px;
      position: relative;
      color: var(--text-muted);
    }

    .writing-guide-steps li::before {
      content: counter(guide-step);
      position: absolute;
      left: 0;
      background: var(--accent);
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      top: 4px;
    }

    .writing-guide-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .writing-guide-progress .wg-progress-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .writing-guide-progress .wg-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .writing-guide-progress .wg-progress-label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .writing-guide-starter {
      font-style: italic;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .use-starter-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .use-starter-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Check Card Enhancements ── */
    .check-contraction {
      background: rgba(168,85,247,0.1);
      border-left: 3px solid var(--purple);
    }

    .check-card .check-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .check-card .check-line-num {
      font-size: 11px;
      color: var(--text-muted);
      float: right;
      margin-top: 2px;
    }

    .check-card .check-suggestion {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Issues Badge ── */
    .issues-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }

    .issues-badge.badge-green {
      background: rgba(34,197,94,0.15);
      color: var(--green);
    }

    .issues-badge.badge-amber {
      background: rgba(245,158,11,0.15);
      color: var(--amber);
    }

    .issues-badge.badge-red {
      background: rgba(239,68,68,0.15);
      color: var(--red);
    }

    .tab-nav button svg { vertical-align: -2px; margin-right: 6px; }

    .reader-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 200; display: none; flex-direction: column;
    }
    .reader-modal.active { display: flex; }
    .reader-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--card); border-bottom: 1px solid var(--border);
      min-height: 60px;
    }
    .reader-header h3 { font-size: 14px; flex: 1; margin-right: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reader-header .reader-meta { font-size: 12px; color: var(--text-muted); margin-right: 16px; }
    .reader-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--card); border-top: 1px solid var(--border);
    }
    .reader-footer .btn-done {
      padding: 10px 32px; border-radius: 8px; border: none;
      background: var(--green); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .reader-footer .btn-done:hover { opacity: 0.9; }
    .reader-footer .btn-close {
      padding: 10px 24px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-size: 14px; cursor: pointer;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" style="margin-bottom:16px">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    <h1>Research Agent</h1>
    <p>Enter your password to access the dashboard</p>
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn" onclick="attemptLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid password. Please try again.</div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
<div class="reader-modal" id="reader-modal">
  <div class="reader-header">
    <h3 id="reader-title"></h3>
    <span class="reader-meta" id="reader-meta"></span>
    <span id="reader-timer" style="font-family:monospace;color:var(--amber);font-size:14px;margin-right:16px">00:00</span>
    <button class="btn-close" onclick="closeReader()">Close</button>
  </div>
  <div class="reader-content" id="reader-content" style="flex:1;overflow-y:auto;padding:24px;max-width:800px;margin:0 auto;width:100%">
    <div id="reader-abstract"></div>
    <div style="margin-top:24px">
      <h4 style="font-size:14px;color:var(--text-muted);margin-bottom:8px">Reading Notes</h4>
      <textarea id="reader-notes" placeholder="Take notes while reading..." style="width:100%;min-height:150px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;resize:vertical"></textarea>
    </div>
  </div>
  <div class="reader-footer">
    <div style="font-size:13px;color:var(--text-muted)" id="reader-doi"></div>
    <div style="display:flex;gap:8px">
      <button onclick="saveForOffline()" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer">&#128190; Save Offline</button>
      <button class="btn-done" onclick="doneReading()">&#10003; Done Reading</button>
    </div>
  </div>
</div>
  <header>
    <div class="logo">
      Research Agent <span>Dashboard</span>
    </div>
    <div id="live-clock" style="color:var(--text-muted);font-size:13px;font-family:monospace;"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <button onclick="exportSession()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer" title="Export session to sync across devices">&#8595; Sync</button>
      <label style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer" title="Import session from another device">&#8593; Sync<input type="file" accept=".json" onchange="importSession(event)" style="display:none"></label>
      <button id="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </header>

  <nav class="tab-nav" id="tab-nav">
    <button class="active" data-tab="dashboard"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</button>
    <button data-tab="sources"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Sources</button>
    <button data-tab="write"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Write</button>

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function buildProgressRing(pct, size, strokeWidth, color) {
  var radius = (size - strokeWidth) / 2;
  var circumference = 2 * Math.PI * radius;
  var offset = circumference - (pct / 100) * circumference;
  return '<div class="progress-ring-container">' +
    '<svg width="' + size + '" height="' + size + '" class="progress-ring" style="transform:rotate(-90deg)">' +
    '<circle class="progress-ring-bg" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" stroke-width="' + strokeWidth + '"/>' +
    '<circle class="progress-ring-fill" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" stroke-width="' + strokeWidth + '" ' +
    'stroke="' + color + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" data-target-offset="' + offset + '"/>' +
    '</svg>' +
    '<div style="margin-top:-' + (size/2 + 10) + 'px;font-size:18px;font-weight:700;color:var(--text);text-align:center;">' + pct.toFixed(0) + '%</div>' +
    '<div style="height:' + (size/2 - 10) + 'px;"></div>' +
    '</div>';
}

function animateCountUp(el, target, duration) {
  var start = 0;
  var startTime = null;
  var isPercent = String(target).indexOf('%') !== -1;
  var numTarget = parseFloat(target);
  if (isNaN(numTarget)) { el.textContent = target; return; }
  var suffix = isPercent ? '%' : '';
  // Check if it has fire emoji
  var extraHtml = '';
  if (el.innerHTML && el.innerHTML.indexOf('&#128293;') !== -1) {
    extraHtml = ' &#128293;';
  }

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    var current = Math.round(eased * numTarget);
    el.innerHTML = current + suffix + extraHtml;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function buildSparkline(logs) {
  var today = new Date();
  var dayNames = ['S','M','T','W','T','F','S'];
  var bars = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var key = d.toISOString().split('T')[0];
    var log = logs[key];
    var mins = log ? (log.total_minutes || 0) : 0;
    bars.push({ mins: mins, day: dayNames[d.getDay()] });
  }
  var maxMins = Math.max.apply(null, bars.map(function(b) { return b.mins; }));
  if (maxMins === 0) maxMins = 1;

  var html = '<div class="sparkline-container">';
  bars.forEach(function(b) {
    var h = Math.max((b.mins / maxMins) * 28, 2);
    html += '<div class="sparkline-bar" style="height:' + h + 'px;" title="' + b.mins + ' min"></div>';
  });
  html += '</div>';
  html += '<div class="sparkline-labels">';
  bars.forEach(function(b) {
    html += '<span>' + b.day + '</span>';
  });
  html += '</div>';
  return html;
}

      const authors = Array.isArray(s.authors) ? s.authors.join(', ') : (s.authors || '');
      const link = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '#');
      html += '<div class="suggestion-card">' +
        '<div class="sg-title">' + esc(s.title) + '</div>' +
        '<div class="sg-meta">' + esc(authors) + '<br>' + esc(s.venue) + ', ' + s.year + '</div>' +
        '<div class="sg-footer">' +
        '<span class="cite-badge">' + (s.citation_count || 0) + ' citations</span>' +
        '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="read-link">Read &rarr;</a>' +
        '</div></div>';
    });
    html += '</div></div>';
  }

  // Coverage Gaps
  if (plan && plan.coverage_gaps && plan.coverage_gaps.length > 0) {
    html += '<div class="card" style="margin-bottom:24px;"><h3>Coverage Gaps</h3>';
    plan.coverage_gaps.forEach(gap => {
      const pct = gap.target > 0 ? Math.min((gap.read_count / gap.target) * 100, 100) : 0;
      const prioClass = gap.priority === 'high' ? 'priority-high' : gap.priority === 'medium' ? 'priority-medium' : 'priority-low';
      const barColor = gap.priority === 'high' ? 'var(--red)' : gap.priority === 'medium' ? 'var(--amber)' : 'var(--green)';
      html += '<div class="gap-item">' +
        '<span class="gap-label">' + esc(formatChapterName(gap.chapter)) + '</span>' +
        '<div class="gap-bar-track"><div class="gap-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
        '<span>' + gap.read_count + '/' + gap.target + '</span>' +
        '<span class="gap-priority ' + prioClass + '">' + esc(gap.priority) + '</span>' +
        '</div>';
    });
    html += '</div>';
  }

  // Charts: Sources by Year and Sources by Status
  html += '<div class="two-col">';

  // Sources by Year
  html += '<div class="card"><h3>Sources by Year</h3><div class="bar-chart">';
  const byYear = stats.by_year || {};
  const maxYear = Math.max(...Object.values(byYear), 1);
  Object.entries(byYear).sort((a,b) => a[0].localeCompare(b[0])).forEach(([year, count]) => {
    const pct = (count / maxYear) * 100;
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + year + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  // Sources by Status
  html += '<div class="card"><h3>Sources by Status</h3><div class="bar-chart">';
  const byStatus = stats.by_status || {};
  const maxStatus = Math.max(...Object.values(byStatus), 1);
  const statusColors = { screened: 'var(--blue)', reading: 'var(--amber)', read: 'var(--green)', cited: 'var(--purple)', excluded: '#71717a' };
  Object.entries(byStatus).forEach(([status, count]) => {
    const pct = (count / maxStatus) * 100;
    const color = statusColors[status] || 'var(--accent)';
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="bar-value">' + count + '</span></div>';
  });
  html += '</div></div>';

  html += '</div>'; // close two-col

  document.getElementById('tab-dashboard').innerHTML = html;

  // Animate count-up on stat values
  document.querySelectorAll('[data-count-target]').forEach(function(el) {
    var target = parseInt(el.dataset.countTarget);
    if (!isNaN(target) && target > 0) {
      animateCountUp(el, target, 600);
    }
  });
}

function setTagFilter(btn) {
  document.querySelectorAll('#filter-tags .filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window._activeTag = btn.dataset.tag;
  filterSources();
}

function filterSources() {
  const search = (document.getElementById('source-search').value || '').toLowerCase();
  const sort = document.getElementById('source-sort').value;
  const tag = window._activeTag || 'all';
  const sugDois = window._suggestedDois || new Set();

  let filtered = (window._sources || []).filter(s => {
    if (s.status === 'excluded') return false;
    if (tag !== 'all' && !(s.relevance_tags || []).includes(tag)) return false;
    if (search) {
      const haystack = [s.title, (s.authors || []).join(' '), s.venue, s.doi].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  if (sort === 'citations') filtered.sort((a,b) => (b.citation_count || 0) - (a.citation_count || 0));
  else if (sort === 'year') filtered.sort((a,b) => b.year - a.year);
  else if (sort === 'title') filtered.sort((a,b) => (a.title || '').localeCompare(b.title || ''));

  let html = '';
  filtered.forEach((s, i) => {
    const isSuggested = sugDois.has(s.doi);
    const rowClass = isSuggested ? 'suggested-row' : '';
    const authors = Array.isArray(s.authors) ? s.authors.slice(0, 3).join(', ') + (s.authors.length > 3 ? ' et al.' : '') : '';
    const statusClass = 'status-' + (s.status || 'screened');
    const link = s.open_access_url || (s.doi ? 'https://doi.org/' + s.doi : '');
    const tagPills = (s.relevance_tags || []).map(t => '<span class="tag-pill">' + esc(t.replace(/_/g, ' ')) + '</span>').join('');

    html += '<tr class="' + rowClass + '">' +
      '<td class="title-cell" onclick="toggleAbstract(' + i + ')">' + esc(s.title) + '</td>' +
      '<td class="authors-cell" title="' + esc((s.authors || []).join(', ')) + '">' + esc(authors) + '</td>' +
      '<td>' + (s.year || '') + '</td>' +
      '<td>' + (s.citation_count || 0) + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + esc(s.status || 'screened') + '</span></td>' +
      '<td>' + tagPills + '</td>' +
      '<td><div style="display:flex;gap:4px;flex-wrap:wrap">' +
        (link ? '<button class="access-link" onclick="openReader(\'' + esc(s.doi).replace(/'/g, "\\'") + '\')">Read</button>' : '') +
        (s.doi ? '<button class="access-link" style="color:var(--amber)" onclick="exportSingleBibtex(\'' + esc(s.doi).replace(/'/g, "\\'") + '\')">BibTeX</button>' : '') +
      '</div></td>' +
      '</tr>';

    html += '<tr class="abstract-row" id="abstract-' + i + '"><td colspan="7">' +
      (s.abstract ? esc(s.abstract).substring(0, 600) + (s.abstract.length > 600 ? '...' : '') : '<em>No abstract available</em>') +
      '</td></tr>';
  });

  document.getElementById('sources-tbody').innerHTML = html;
}

function toggleAbstract(idx) {
  const row = document.getElementById('abstract-' + idx);
  if (row) row.classList.toggle('visible');
}

// ── READER MODAL ──
let _readerSource = null;

let _readerTimerInterval = null;
let _readerStartTime = null;

function openReader(doi) {
  const source = (DATA.sources || []).find(s => s.doi === doi);
  if (!source) return;
  _readerSource = source;

  document.getElementById('reader-title').textContent = source.title || 'Untitled';
  document.getElementById('reader-meta').textContent = (source.authors || []).slice(0,3).join(', ') + ' (' + (source.year || '') + ')';
  document.getElementById('reader-doi').textContent = 'DOI: ' + (source.doi || '');

  // Build abstract section
  const abstractDiv = document.getElementById('reader-abstract');
  let abstractHtml = '<div style="margin-bottom:16px">';
  abstractHtml += '<h4 style="font-size:16px;margin-bottom:4px">' + esc(source.title || 'Untitled') + '</h4>';
  abstractHtml += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">' + esc((source.authors || []).join(', ')) + '</div>';
  if (source.year || source.venue) {
    abstractHtml += '<div style="font-size:13px;color:var(--text-muted)">' + esc((source.venue || '') + (source.year ? ' (' + source.year + ')' : '')) + '</div>';
  }
  abstractHtml += '</div>';
  if (source.abstract) {
    abstractHtml += '<div style="margin-bottom:16px"><h4 style="font-size:14px;color:var(--text-muted);margin-bottom:8px">Abstract</h4>' +
      '<p style="font-size:14px;line-height:1.7;color:var(--text)">' + esc(source.abstract) + '</p></div>';
  }
  abstractDiv.innerHTML = abstractHtml;

  // Load saved notes from localStorage
  const savedNotes = JSON.parse(localStorage.getItem('reader-notes') || '{}');
  const notesTextarea = document.getElementById('reader-notes');
  notesTextarea.value = savedNotes[doi] || '';

  // Open the paper in a new tab
  const url = source.open_access_url || (source.doi ? 'https://doi.org/' + source.doi : '');
  if (url) {
    window.open(url, '_blank');
  }

  // Start the reading timer
  _readerStartTime = Date.now();
  document.getElementById('reader-timer').textContent = '00:00';
  if (_readerTimerInterval) clearInterval(_readerTimerInterval);
  _readerTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - _readerStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('reader-timer').textContent = mins + ':' + secs;
  }, 1000);

  document.getElementById('reader-modal').classList.add('active');
}

function closeReader() {
  if (_readerTimerInterval) clearInterval(_readerTimerInterval);
  // Save reading notes
  if (_readerSource) {
    const notes = document.getElementById('reader-notes').value;
    if (notes) {
      const saved = JSON.parse(localStorage.getItem('reader-notes') || '{}');
      saved[_readerSource.doi] = notes;
      localStorage.setItem('reader-notes', JSON.stringify(saved));
    }
  }
  document.getElementById('reader-modal').classList.remove('active');
  _readerSource = null;
}

function doneReading() {
  if (!_readerSource) return;
  const doi = _readerSource.doi;

  let readSources = JSON.parse(localStorage.getItem('read-sources') || '{}');
  readSources[doi] = { read_date: new Date().toISOString(), title: _readerSource.title };
  localStorage.setItem('read-sources', JSON.stringify(readSources));

  const source = (DATA.sources || []).find(s => s.doi === doi);
  if (source) {
    source.status = 'read';
    source.read_date = new Date().toISOString().split('T')[0];
  }

  closeReader();
  showToast('Marked as read: ' + (_readerSource ? _readerSource.title : '').substring(0, 50) + '...');

  generateQuizForSource(doi);
}

function generateQuizForSource(doi) {

  const title = source.title || 'this paper';
  const authorName = (source.authors || ['the authors'])[0];

  const questions = [
    { id: 1, type: 'recall', question: 'What is the main research question or objective of "' + title + '"?', source_title: title, difficulty: 'medium', scoring_rubric: {'0':'No answer','1':'Vague','2':'Partial','3':'Good','4':'Detailed','5':'Excellent'} },
    { id: 2, type: 'recall', question: 'What methodology did ' + authorName + ' use in "' + title + '"?', source_title: title, difficulty: 'medium', scoring_rubric: {'0':'No answer','1':'Vague','2':'Partial','3':'Good','4':'Detailed','5':'Excellent'} },
    { id: 3, type: 'comprehension', question: 'In your own words, explain the main argument or finding of "' + title + '".', source_title: title, difficulty: 'hard', scoring_rubric: {'0':'No answer','1':'Copied','2':'Basic','3':'Shows understanding','4':'Insightful','5':'Mastery'} },
    { id: 4, type: 'comprehension', question: 'What are the key limitations acknowledged in "' + title + '"?', source_title: title, difficulty: 'medium', scoring_rubric: {'0':'No answer','1':'Vague','2':'Partial','3':'Good','4':'Detailed','5':'Excellent'} },
    { id: 5, type: 'application', question: 'How does "' + title + '" relate to your research on serious games for indigenous farming knowledge?', source_title: title, difficulty: 'hard', scoring_rubric: {'0':'No answer','1':'Generic','2':'Some link','3':'Clear connection','4':'Strong analysis','5':'Novel insight'} },
    { id: 6, type: 'application', question: 'Which section of your Chapter 2 could cite "' + title + '" and why?', source_title: title, difficulty: 'medium', scoring_rubric: {'0':'No answer','1':'Wrong section','2':'Right section','3':'Good justification','4':'Strong fit','5':'Excellent with specifics'} },
    { id: 7, type: 'critical_analysis', question: 'What are the methodological strengths and weaknesses of "' + title + '"?', source_title: title, difficulty: 'hard', scoring_rubric: {'0':'No answer','1':'Surface level','2':'One point','3':'Multiple points','4':'Balanced analysis','5':'Deep critical evaluation'} },
    { id: 8, type: 'critical_analysis', question: 'If you were reviewing "' + title + '" for a journal, what would you highlight as its main contribution and main limitation?', source_title: title, difficulty: 'hard', scoring_rubric: {'0':'No answer','1':'Surface','2':'Basic review','3':'Good analysis','4':'Thorough','5':'Expert-level review'} },
    { id: 9, type: 'comprehension', question: 'What theoretical framework or conceptual approach does "' + title + '" use?', source_title: title, difficulty: 'medium', scoring_rubric: {'0':'No answer','1':'Vague','2':'Named framework','3':'Explained','4':'Connected to context','5':'Critical evaluation'} },
    { id: 10, type: 'application', question: 'What specific design decision for your serious game could be informed by the findings of "' + title + '"?', source_title: title, difficulty: 'hard', scoring_rubric: {'0':'No answer','1':'Generic','2':'Relevant idea','3':'Specific decision','4':'Well justified','5':'Innovative application'} },
  ];

  const quiz = { quiz_type: 'paper-specific', generated_at: new Date().toISOString(), based_on_sources: [doi], questions: questions, must_redo: false };

  if (!DATA.quizzes) DATA.quizzes = [];

  const navBtn = document.querySelector('[data-tab="quizzes"]');
  if (navBtn) navBtn.click();
  renderQuizzes();
