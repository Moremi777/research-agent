name: Weekly Source Refresh

on:
  schedule:
    - cron: '0 8 * * 0'  # Sunday 08:00 UTC (10:00 SAST)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  refresh-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search for new sources (2020-2026) across all sub-topics
        run: |
          echo "Searching indigenous farming knowledge..."
          python -m tools.search_literature --query "indigenous farming knowledge sustainable agriculture Africa" --output .tmp/weekly-ik.json --year-min 2020 --max-results 10
          sleep 2

          echo "Searching sustainable agriculture..."
          python -m tools.search_literature --query "sustainable agriculture climate-smart farming food security" --output .tmp/weekly-sustain.json --year-min 2020 --max-results 10
          sleep 2

          echo "Searching modern agricultural science..."
          python -m tools.search_literature --query "modern agricultural science technology precision farming" --output .tmp/weekly-modern.json --year-min 2020 --max-results 10
          sleep 2

          echo "Searching serious games..."
          python -m tools.search_literature --query "serious games education learning game-based" --output .tmp/weekly-sg.json --year-min 2022 --max-results 10
          sleep 2

          echo "Searching multiplayer simulations..."
          python -m tools.search_literature --query "multiplayer simulation game collaborative learning education" --output .tmp/weekly-multi.json --year-min 2020 --max-results 10

      - name: Import and screen new sources
        run: |
          for f in .tmp/weekly-*.json; do
            echo "Importing $f..."
            python -m tools.manage_sources --action import-search --input "$f"
          done

          # Screen and tag all newly discovered sources
          python -c "
          from tools.utils import load_json
          from tools.manage_sources import action_update

          tracker = load_json('data/sources/source-tracker.json') or {'sources': []}

          def assign_tags(s):
              combined = ((s.get('title') or '') + ' ' + (s.get('abstract') or '')).lower()
              tags, chapters = [], []
              if any(kw in combined for kw in ['indigenous knowledge', 'indigenous farming', 'traditional farming', 'traditional agriculture', 'farmer knowledge', 'indigenous crops']):
                  tags.append('indigenous_knowledge'); chapters.append('ch2_indigenous_knowledge')
              if any(kw in combined for kw in ['sustainable agriculture', 'sustainability', 'food security', 'climate-smart', 'sustainable farming']):
                  tags.append('sustainable_agriculture'); chapters.append('ch2_sustainable_agriculture')
              if any(kw in combined for kw in ['precision agriculture', 'iot', 'smart agriculture', 'agricultural extension', 'agricultural technology']):
                  tags.append('modern_ag_science'); chapters.append('ch2_modern_ag_science')
              if any(kw in combined for kw in ['serious game', 'game-based learning', 'gamification', 'educational game']):
                  tags.append('serious_games'); chapters.append('ch2_serious_games')
              if any(kw in combined for kw in ['multiplayer', 'simulation game', 'peer learning', 'collaborative', 'co-design']):
                  tags.append('multiplayer_simulations'); chapters.append('ch2_multiplayer_simulations')
              if any(kw in combined for kw in ['design science']):
                  tags.append('dsr')
              if any(kw in combined for kw in ['africa', 'african', 'south africa', 'southern africa']):
                  tags.append('southern_africa')
              if any(kw in combined for kw in ['smallholder', 'food security']):
                  chapters.append('ch1_background')
              if not tags: tags.append('general')
              return tags, chapters

          count = 0
          for s in tracker['sources']:
              if s.get('status') == 'discovered':
                  doi = s.get('doi')
                  if doi:
                      tags, chapters = assign_tags(s)
                      action_update(doi, {'status': 'screened', 'relevance_tags': tags, 'chapter_relevance': chapters})
                      count += 1
          print(f'Screened {count} new sources')
          "

      - name: Export updated dashboard data
        run: python -m tools.export_dashboard_data

      - name: Show updated stats
        run: python -m tools.manage_sources --action stats

      - name: Commit and push
        run: |
          git config user.name "Research Agent Bot"
          git config user.email "actions@github.com"
          git add docs/data.json data/sources/source-tracker.json
          git diff --staged --quiet || git commit -m "Weekly source refresh: $(date +%Y-%m-%d) — new papers added"
          git push
